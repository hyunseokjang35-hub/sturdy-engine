<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가상 실험실 - 고체에서 열의 이동</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;overflow:hidden;background:#1a1a2e;width:100vw;height:100vh}
#canvas-container{width:100%;height:100%;position:relative}
canvas{display:block}

#header{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,#00b894,#00cec9);display:flex;align-items:center;padding:0 20px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
#header .mascot-icon{width:36px;height:36px;background:#55efc4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px}
#header .title-badge{background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 14px;color:#fff;font-weight:700;font-size:14px;margin-right:14px}
#header .subtitle{color:#fff;font-size:13px;font-weight:500}

#step-indicator{position:absolute;top:64px;left:20px;display:flex;gap:6px;z-index:100}
.step-dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);transition:all .4s}
.step-dot.active{background:#00b894;color:#fff;box-shadow:0 3px 10px rgba(0,184,148,0.4)}
.step-dot.completed{background:#55efc4;color:#fff}

#guide-area{position:absolute;bottom:14px;left:14px;display:flex;align-items:flex-end;gap:0;z-index:100;pointer-events:none}
#guide-bubble{background:#fff;border-radius:18px;padding:12px 20px;font-size:13.5px;font-weight:500;color:#2d3436;box-shadow:0 5px 20px rgba(0,0,0,0.18);max-width:400px;line-height:1.6;transition:opacity .35s;opacity:1;position:relative;margin-bottom:16px;white-space:pre-line}
#guide-bubble::after{content:'';position:absolute;bottom:-8px;left:24px;border-left:9px solid transparent;border-right:9px solid transparent;border-top:9px solid #fff}
#character-svg{width:72px;height:72px;flex-shrink:0}

#side-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:100}
.plate-option{width:118px;background:rgba(255,255,255,0.96);border-radius:14px;padding:10px;text-align:center;cursor:grab;transition:all .25s;box-shadow:0 3px 14px rgba(0,0,0,0.14);user-select:none}
.plate-option:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,0.22)}
.plate-option:active{cursor:grabbing}
.plate-preview{width:94px;height:60px;margin:0 auto 5px;display:flex;align-items:center;justify-content:center}
.plate-label{font-size:11px;font-weight:700;color:#2d3436}

#candle-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:100;display:none}
.candle-option{width:126px;background:rgba(255,255,255,0.96);border-radius:14px;padding:14px 10px;text-align:center;cursor:grab;box-shadow:0 3px 14px rgba(0,0,0,0.14);transition:all .25s;user-select:none}
.candle-option:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,0.22)}
.candle-option:active{cursor:grabbing}
.candle-icon-area{width:90px;height:95px;margin:0 auto 6px}
.candle-label{font-size:12px;font-weight:700;color:#2d3436}

#next-btn{position:absolute;bottom:20px;right:20px;padding:12px 28px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;z-index:100;box-shadow:0 4px 18px rgba(0,184,148,0.4);transition:all .25s;display:none}
#next-btn:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(0,184,148,0.5)}

#reset-btn{position:absolute;bottom:100px;left:18px;width:44px;height:44px;background:#222;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;transition:all .3s;color:#fff;font-size:20px;box-shadow:0 3px 12px rgba(0,0,0,0.4)}
#reset-btn:hover{background:#000;transform:rotate(-180deg);box-shadow:0 5px 18px rgba(0,0,0,0.5)}

/* Drop zone indicator (dashed rounded rect) */
#drop-zone-indicator{position:absolute;pointer-events:none;z-index:50;display:block;border:3px dashed rgba(150,150,150,0.6);border-radius:16px;transition:opacity .3s,border-color .3s}
#drop-zone-indicator.highlight{border-color:#00b894;box-shadow:0 0 18px rgba(0,184,148,0.3)}

#summary-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200}
#summary-card{background:#fff;border-radius:22px;padding:42px;max-width:520px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,0.3);animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#summary-card h2{font-size:22px;color:#00b894;margin-bottom:6px}
#summary-card .icon{font-size:44px;margin-bottom:12px}
#summary-card p{font-size:16px;color:#2d3436;line-height:1.8;margin-bottom:20px}
#summary-card .highlight{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;padding:14px 20px;border-radius:14px;font-size:15px;font-weight:700;line-height:1.6}
#summary-card button{margin-top:20px;padding:11px 28px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
#summary-card button:hover{transform:translateY(-2px)}

#loading{position:absolute;top:0;left:0;right:0;bottom:0;background:#c8d6dc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;transition:opacity .5s}
.spinner{width:44px;height:44px;border:4px solid rgba(0,184,148,0.2);border-top-color:#00b894;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
#loading p{color:#555;margin-top:14px;font-weight:500}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>가상 실험실을 준비하고 있어요...</p></div>

<div id="canvas-container">
  <div id="header">
    <div class="mascot-icon">🔬</div>
    <div class="title-badge">가상 실험실</div>
    <div class="subtitle">고체에서 열의 이동으로 나타나는 현상 관찰하기</div>
  </div>

  <div id="step-indicator">
    <div class="step-dot active" id="dot-1">1</div>
    <div class="step-dot" id="dot-2">2</div>
    <div class="step-dot" id="dot-3">3</div>
  </div>

  <div id="guide-area">
    <div id="guide-bubble">열 변색 붙임딱지가 붙어 있는 구리판 중 하나를 골라 고정 집게 쪽으로 드래그해 주세요.</div>
    <svg id="character-svg" viewBox="0 0 100 110">
      <ellipse cx="50" cy="62" rx="30" ry="26" fill="#6BCB77"/>
      <ellipse cx="37" cy="52" rx="9" ry="10" fill="#fff"/>
      <ellipse cx="63" cy="52" rx="9" ry="10" fill="#fff"/>
      <circle cx="39" cy="53" r="5" fill="#2d3436"/>
      <circle cx="65" cy="53" r="5" fill="#2d3436"/>
      <circle cx="41" cy="51" r="2" fill="#fff"/>
      <circle cx="67" cy="51" r="2" fill="#fff"/>
      <path d="M43,68 Q50,76 57,68" stroke="#2d3436" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="22" cy="65" rx="7" ry="4.5" fill="#6BCB77"/>
      <ellipse cx="78" cy="60" rx="7" ry="4.5" fill="#6BCB77" transform="rotate(-15 78 60)"/>
      <rect x="37" y="86" width="9" height="7" rx="3" fill="#FF8C00"/>
      <rect x="54" y="86" width="9" height="7" rx="3" fill="#FF8C00"/>
      <circle cx="50" cy="34" r="4.5" fill="#FFD93D"/>
      <line x1="50" y1="38" x2="50" y2="36" stroke="#888" stroke-width="1.5"/>
    </svg>
  </div>

  <!-- Plates with stickers pre-applied -->
  <div id="side-panel">
    <!-- 길게 자른 구리판: long bar -->
    <div class="plate-option" data-plate="bar">
      <div class="plate-preview">
        <svg width="94" height="24" viewBox="0 0 94 24">
          <rect x="2" y="13" width="90" height="3" rx="1" fill="#d4845a"/>
          <rect x="2" y="8" width="90" height="6" rx="1" fill="#e84393" opacity="0.92"/>
        </svg>
      </div>
      <div class="plate-label">길게 자른 구리판</div>
    </div>
    <!-- 정사각형 구리판: actual square shape -->
    <div class="plate-option" data-plate="square">
      <div class="plate-preview">
        <svg width="56" height="58" viewBox="0 0 56 58">
          <!-- 3D-ish square plate seen at slight angle -->
          <rect x="2" y="4" width="52" height="48" rx="2" fill="#e84393" opacity="0.92"/>
          <rect x="2" y="48" width="52" height="3" rx="1" fill="#d4845a"/>
        </svg>
      </div>
      <div class="plate-label">정사각형 구리판</div>
    </div>
    <!-- ㄷ 모양 구리판: wider strokes -->
    <div class="plate-option" data-plate="c-shape">
      <div class="plate-preview">
        <svg width="58" height="56" viewBox="0 0 58 56">
          <!-- ㄷ shape with thicker/wider strokes -->
          <path d="M4,2 L54,2 L54,16 L18,16 L18,36 L54,36 L54,52 L4,52 Z" fill="#e84393" opacity="0.88"/>
          <path d="M4,16 L18,16 L18,36 L4,36 Z" fill="#e84393" opacity="0.88"/>
          <!-- copper edge at bottom of each arm -->
          <path d="M4,52 L54,52 L54,55 L4,55 Z" fill="#d4845a"/>
          <path d="M4,2 L54,2 L54,5 L4,5 Z" fill="#d4845a" opacity="0"/>
        </svg>
      </div>
      <div class="plate-label">ㄷ 모양 구리판</div>
    </div>
  </div>

  <!-- Candle + tripod panel -->
  <div id="candle-panel">
    <div class="candle-option" id="candle-drag">
      <div class="candle-icon-area">
        <svg viewBox="0 0 90 95" width="90" height="95">
          <line x1="30" y1="52" x2="10" y2="90" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/>
          <line x1="60" y1="52" x2="80" y2="90" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/>
          <line x1="38" y1="52" x2="22" y2="92" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/>
          <line x1="52" y1="52" x2="68" y2="92" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/>
          <rect x="22" y="44" width="46" height="8" rx="2" fill="#c8c8c8" opacity="0.5"/>
          <rect x="22" y="44" width="46" height="8" rx="2" fill="none" stroke="#aaa" stroke-width="0.8"/>
          <line x1="28" y1="44" x2="28" y2="52" stroke="#bbb" stroke-width="0.5"/>
          <line x1="34" y1="44" x2="34" y2="52" stroke="#bbb" stroke-width="0.5"/>
          <line x1="40" y1="44" x2="40" y2="52" stroke="#bbb" stroke-width="0.5"/>
          <line x1="46" y1="44" x2="46" y2="52" stroke="#bbb" stroke-width="0.5"/>
          <line x1="52" y1="44" x2="52" y2="52" stroke="#bbb" stroke-width="0.5"/>
          <line x1="58" y1="44" x2="58" y2="52" stroke="#bbb" stroke-width="0.5"/>
          <ellipse cx="45" cy="43" rx="10" ry="3" fill="#eee" stroke="#ddd"/>
          <rect x="38" y="28" width="14" height="16" rx="3" fill="#f0ece4" stroke="#ddd" stroke-width="0.5"/>
          <line x1="45" y1="28" x2="45" y2="22" stroke="#555" stroke-width="1.2"/>
          <ellipse cx="45" cy="16" rx="5" ry="9" fill="#fdcb6e" opacity="0.85"/>
          <ellipse cx="45" cy="17" rx="3" ry="6" fill="#f39c12"/>
          <ellipse cx="45" cy="18" rx="1.5" ry="3.5" fill="#fff8e7"/>
        </svg>
      </div>
      <div class="candle-label">삼발이 + 초</div>
    </div>
  </div>

  <!-- Drop zone indicator (positioned via JS) -->
  <div id="drop-zone-indicator"></div>

  <button id="next-btn" onclick="goToSummary()">실험 정리하기 →</button>
  <div id="reset-btn" onclick="resetExperiment()">↺</div>
</div>

<div id="summary-overlay">
  <div id="summary-card">
    <div class="icon">🔥</div>
    <h2>실험 결과 정리</h2>
    <p>세 가지 모양의 구리판에서 열의 이동을 관찰했어요!</p>
    <div class="highlight">고체에서는 온도가 높은 곳에서 온도가 낮은 곳으로<br>물체를 따라 열이 이동합니다.</div>
    <button onclick="resetExperiment()">처음부터 다시하기</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== STATE =====
let currentStep=0, currentPlate=null, isHeating=false, heatTime=0, heatSourceWorld=null;
let scene,camera,renderer;
let standGroup,plateGroup,stickerGroup,candleGroup;
let stickerMaterials=[];
let flameMesh,flameLight,innerFlameMesh;
let isDragging=false, prevMouse={x:0,y:0};
let targetRot={x:0.25,y:-0.4}, curRot={x:0.25,y:-0.4};
let targetZoom=5.2, curZoom=5.2;
let raycaster=new THREE.Raycaster(), groundPlane;
let isDraggingCandle=false;
let dropZoneEl;

// Clamp tip world pos - where plate attaches
// Stand at (-1.2,0,0), blue tips at local ~(1.1, 1.35, 0)
const STAND_OFFSET=new THREE.Vector3(-1.2,0,0);
const CLAMP_TIP_LOCAL=new THREE.Vector3(1.1,1.35,0); // shortened arm
function getClampWorldPos(){return CLAMP_TIP_LOCAL.clone().add(STAND_OFFSET);}

function getClampScreenPos(){
  const wp=getClampWorldPos();
  const sp=wp.clone().project(camera);
  return{x:(sp.x*0.5+0.5)*innerWidth,y:(-sp.y*0.5+0.5)*innerHeight};
}

// ===== INIT =====
function init(){
  scene=new THREE.Scene();
  const bgC=document.createElement('canvas');bgC.width=512;bgC.height=512;
  const bgx=bgC.getContext('2d');
  const gr=bgx.createLinearGradient(0,0,0,512);
  gr.addColorStop(0,'#e8f0f2');gr.addColorStop(0.45,'#d5e2e8');gr.addColorStop(1,'#c0d0d8');
  bgx.fillStyle=gr;bgx.fillRect(0,0,512,512);
  scene.background=new THREE.CanvasTexture(bgC);

  camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,100);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  const dl=new THREE.DirectionalLight(0xffffff,0.75);
  dl.position.set(4,8,5);dl.castShadow=true;
  dl.shadow.mapSize.set(2048,2048);
  dl.shadow.camera.near=0.5;dl.shadow.camera.far=25;
  dl.shadow.camera.left=-6;dl.shadow.camera.right=6;
  dl.shadow.camera.top=6;dl.shadow.camera.bottom=-6;
  scene.add(dl);
  const fl=new THREE.DirectionalLight(0x99bbdd,0.25);fl.position.set(-3,3,-2);scene.add(fl);

  const floorMat=new THREE.MeshStandardMaterial({color:0xb8ccd6,roughness:0.7,metalness:0.05});
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(20,20),floorMat);
  floor.rotation.x=-Math.PI/2;floor.position.y=-0.01;floor.receiveShadow=true;scene.add(floor);

  groundPlane=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshBasicMaterial({visible:false}));
  groundPlane.rotation.x=-Math.PI/2;groundPlane.position.y=0.02;scene.add(groundPlane);

  dropZoneEl=document.getElementById('drop-zone-indicator');

  buildStand();
  setupEvents();
  updateDropZone();

  setTimeout(()=>{
    document.getElementById('loading').style.opacity='0';
    setTimeout(()=>document.getElementById('loading').style.display='none',500);
  },500);
  animate();
}

// ===== STAND - shorter clamp arm, bolt/nut detail on blue tips =====
function buildStand(){
  standGroup=new THREE.Group();
  const metal=new THREE.MeshStandardMaterial({color:0xd0d0d0,roughness:0.18,metalness:0.92});
  const darkMetal=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.4,metalness:0.35});
  const blueMat=new THREE.MeshStandardMaterial({color:0x2065c9,roughness:0.35,metalness:0.2});

  // Black base
  const base=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.13,1.4),darkMetal);
  base.position.y=0.1;base.castShadow=true;base.receiveShadow=true;standGroup.add(base);
  for(let fx of[-0.8,0.8])for(let fz of[-0.55,0.55]){
    const foot=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.06,0.15),darkMetal);
    foot.position.set(fx,0.02,fz);standGroup.add(foot);
  }

  // Vertical pole
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,3.2,20),metal);
  pole.position.set(-0.2,1.77,0);pole.castShadow=true;standGroup.add(pole);

  // Horizontal bar (shorter - ends before blue tips)
  const hBar=new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.032,1.4,14),metal);
  hBar.rotation.z=Math.PI/2;hBar.position.set(0.3,1.35,0);hBar.castShadow=true;standGroup.add(hBar);

  // Clamp block at junction
  const clampBlock=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.18,0.22),darkMetal);
  clampBlock.position.set(-0.05,1.35,0);standGroup.add(clampBlock);

  // Two black knobs
  const knobGeo=new THREE.CylinderGeometry(0.055,0.055,0.08,12);
  const k1=new THREE.Mesh(knobGeo,darkMetal);k1.rotation.x=Math.PI/2;k1.position.set(-0.05,1.42,0.14);standGroup.add(k1);
  const k2=new THREE.Mesh(knobGeo,darkMetal);k2.rotation.x=Math.PI/2;k2.position.set(-0.05,1.28,0.14);standGroup.add(k2);

  // Short clamp arm from block to blue tips
  const arm=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.04,0.04),metal);
  arm.position.set(0.35,1.35,0);standGroup.add(arm);

  // ----- BLUE CLAMP TIPS with bolt/nut -----
  // Pivot point between the two jaws
  const pivotX=0.72;

  // Pivot bolt (horizontal cylinder through both jaws)
  const pivotBolt=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.28,8),metal);
  pivotBolt.rotation.x=Math.PI/2;pivotBolt.position.set(pivotX,1.35,0);standGroup.add(pivotBolt);

  // Hex nut on front of pivot
  const nutGeo=new THREE.CylinderGeometry(0.035,0.035,0.03,6);
  const nut=new THREE.Mesh(nutGeo,new THREE.MeshStandardMaterial({color:0x888,roughness:0.25,metalness:0.85}));
  nut.rotation.x=Math.PI/2;nut.position.set(pivotX,1.35,0.15);standGroup.add(nut);

  // Bolt head on back
  const boltHead=new THREE.Mesh(nutGeo.clone(),new THREE.MeshStandardMaterial({color:0x888,roughness:0.25,metalness:0.85}));
  boltHead.rotation.x=Math.PI/2;boltHead.position.set(pivotX,1.35,-0.15);standGroup.add(boltHead);

  // Upper blue jaw (angled slightly open)
  const jawUp=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.05,0.2),blueMat);
  jawUp.position.set(0.95,1.41,0);jawUp.rotation.z=0.06;jawUp.castShadow=true;standGroup.add(jawUp);

  // Lower blue jaw
  const jawDn=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.05,0.2),blueMat);
  jawDn.position.set(0.95,1.29,0);jawDn.rotation.z=-0.06;jawDn.castShadow=true;standGroup.add(jawDn);

  // Rounded tips of jaws
  const tipGeo=new THREE.SphereGeometry(0.04,8,8);
  const tU=new THREE.Mesh(tipGeo,blueMat);tU.position.set(1.12,1.42,0);tU.scale.set(1,0.6,1.5);standGroup.add(tU);
  const tD=new THREE.Mesh(tipGeo,blueMat);tD.position.set(1.12,1.29,0);tD.scale.set(1,0.6,1.5);standGroup.add(tD);

  // Tightening screw below blue clamp
  const screw=new THREE.Mesh(new THREE.CylinderGeometry(0.016,0.016,0.1,6),metal);
  screw.position.set(0.95,1.22,0);standGroup.add(screw);
  const sH=new THREE.Mesh(new THREE.SphereGeometry(0.028,6,6),new THREE.MeshStandardMaterial({color:0x666,roughness:0.3,metalness:0.7}));
  sH.position.set(0.95,1.17,0);standGroup.add(sH);

  // Spring coil between jaws (decorative)
  const springMat=new THREE.MeshStandardMaterial({color:0xaaa,roughness:0.3,metalness:0.7});
  for(let i=0;i<3;i++){
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.025,0.005,6,12),springMat);
    ring.position.set(0.78+i*0.04,1.35,0);
    ring.rotation.y=Math.PI/2;
    standGroup.add(ring);
  }

  standGroup.position.copy(STAND_OFFSET);
  scene.add(standGroup);
}

// ===== COPPER PLATES (50% thinner) with sticker =====
function createPlateWithSticker(type){
  if(plateGroup)scene.remove(plateGroup);
  if(stickerGroup)scene.remove(stickerGroup);
  plateGroup=new THREE.Group();stickerGroup=new THREE.Group();stickerMaterials=[];

  const copper=new THREE.MeshStandardMaterial({color:0xd4845a,roughness:0.3,metalness:0.7});
  const t=0.018; // 50% of previous 0.035

  const cw=getClampWorldPos();
  const py=cw.y;

  if(type==='bar'){
    plateGroup.add(makeMesh(new THREE.BoxGeometry(3,t,0.45),copper));
    createStickerQuad(3,0.45,0,0);
  }else if(type==='square'){
    plateGroup.add(makeMesh(new THREE.BoxGeometry(1.7,t,1.7),copper));
    createStickerQuad(1.7,1.7,0,0);
  }else{
    const a=new THREE.Mesh(new THREE.BoxGeometry(1.7,t,0.32),copper);a.position.set(0,0,-0.69);a.castShadow=true;plateGroup.add(a);
    const b=new THREE.Mesh(new THREE.BoxGeometry(1.7,t,0.32),copper);b.position.set(0,0,0.69);b.castShadow=true;plateGroup.add(b);
    const c=new THREE.Mesh(new THREE.BoxGeometry(0.32,t,1.7),copper);c.position.set(-0.69,0,0);c.castShadow=true;plateGroup.add(c);
    createStickerQuad(1.7,0.32,0,-0.69);
    createStickerQuad(1.7,0.32,0,0.69);
    createStickerQuad(0.32,1.7,-0.69,0);
  }

  // Position plate so its left edge starts at clamp tip
  plateGroup.position.set(cw.x+0.6,py,0);
  stickerGroup.position.set(cw.x+0.6,py+t/2+0.003,0);
  scene.add(plateGroup);scene.add(stickerGroup);
}

function makeMesh(g,m){const o=new THREE.Mesh(g,m);o.castShadow=true;o.receiveShadow=true;return o;}

function createStickerQuad(w,h,ox,oz){
  const sx=Math.max(6,Math.round(w*14)),sz=Math.max(6,Math.round(h*14));
  const geo=new THREE.PlaneGeometry(w*0.97,h*0.97,sx,sz);
  const cnt=geo.attributes.position.count;
  const cols=new Float32Array(cnt*3);
  for(let i=0;i<cnt;i++){cols[i*3]=0.91;cols[i*3+1]=0.27;cols[i*3+2]=0.47;}
  geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  const mat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.55,metalness:0.03,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geo,mat);mesh.rotation.x=-Math.PI/2;mesh.position.set(ox,0,oz);
  stickerGroup.add(mesh);
  stickerMaterials.push({mesh,geo,w,h,ox,oz});
}

// ===== TRIPOD + CANDLE =====
function buildTripodCandle(wx,wz){
  if(candleGroup)scene.remove(candleGroup);
  candleGroup=new THREE.Group();
  const legMat=new THREE.MeshStandardMaterial({color:0xc8c8c8,roughness:0.2,metalness:0.9});
  const legs=[
    {tx:-0.12,tz:-0.12,bx:-0.3,bz:-0.3},
    {tx:0.12,tz:-0.12,bx:0.3,bz:-0.3},
    {tx:-0.12,tz:0.12,bx:-0.3,bz:0.3},
    {tx:0.12,tz:0.12,bx:0.3,bz:0.3},
  ];
  legs.forEach(lp=>{
    const dx=lp.bx-lp.tx,dz=lp.bz-lp.tz,dy=-0.65;
    const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
    const geo=new THREE.CylinderGeometry(0.012,0.014,len,6);
    const leg=new THREE.Mesh(geo,legMat);
    leg.position.set((lp.tx+lp.bx)/2,0.65/2,(lp.tz+lp.bz)/2);
    const dir=new THREE.Vector3(dx,dy,dz).normalize();
    leg.setRotationFromQuaternion(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),dir));
    leg.castShadow=true;candleGroup.add(leg);
  });

  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.15,0.01,8,24),legMat);
  ring.rotation.x=Math.PI/2;ring.position.y=0.65;candleGroup.add(ring);

  const gauzeMat=new THREE.MeshStandardMaterial({color:0xb5b5b5,roughness:0.45,metalness:0.55,transparent:true,opacity:0.65});
  const gauze=new THREE.Mesh(new THREE.PlaneGeometry(0.42,0.42),gauzeMat);
  gauze.rotation.x=-Math.PI/2;gauze.position.y=0.66;candleGroup.add(gauze);

  const wireMat=new THREE.MeshBasicMaterial({color:0x999});
  for(let i=-4;i<=4;i++){
    candleGroup.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.40,0.003,0.004),wireMat),{position:new THREE.Vector3(0,0.665,i*0.045)}));
    candleGroup.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.004,0.003,0.40),wireMat),{position:new THREE.Vector3(i*0.045,0.665,0)}));
  }

  const dish=new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.1,0.015,20),new THREE.MeshStandardMaterial({color:0xf0f0f0,roughness:0.4,metalness:0.05}));
  dish.position.y=0.675;candleGroup.add(dish);

  const tinMat=new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.25,metalness:0.8});
  const tin=new THREE.Mesh(new THREE.CylinderGeometry(0.068,0.068,0.02,18),tinMat);
  tin.position.y=0.695;candleGroup.add(tin);

  const cBodyMat=new THREE.MeshStandardMaterial({color:0xf0ece0,roughness:0.65,transparent:true,opacity:0.88});
  const cBody=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.065,0.14,18),cBodyMat);
  cBody.position.y=0.755;cBody.castShadow=true;candleGroup.add(cBody);

  candleGroup.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.003,0.003,0.14,4),new THREE.MeshBasicMaterial({color:0x444})),{position:new THREE.Vector3(0,0.755,0)}));
  candleGroup.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.003,0.002,0.04,4),new THREE.MeshBasicMaterial({color:0x333})),{position:new THREE.Vector3(0,0.845,0)}));

  const fGeo=new THREE.SphereGeometry(0.035,10,14);fGeo.scale(1,2.4,1);
  flameMesh=new THREE.Mesh(fGeo,new THREE.MeshBasicMaterial({color:0xfdcb6e,transparent:true,opacity:0.9}));
  flameMesh.position.y=0.91;candleGroup.add(flameMesh);

  const ifGeo=new THREE.SphereGeometry(0.018,8,10);ifGeo.scale(1,2.0,1);
  innerFlameMesh=new THREE.Mesh(ifGeo,new THREE.MeshBasicMaterial({color:0xfff8ee,transparent:true,opacity:0.95}));
  innerFlameMesh.position.y=0.92;candleGroup.add(innerFlameMesh);

  flameLight=new THREE.PointLight(0xff9500,1.6,4);flameLight.position.y=0.91;candleGroup.add(flameLight);

  candleGroup.position.set(wx,0.02,wz);scene.add(candleGroup);
}

// ===== HEAT =====
function updateHeat(dt){
  if(!isHeating||!heatSourceWorld||!stickerMaterials.length)return;
  heatTime+=dt;
  stickerMaterials.forEach(sm=>{
    const pos=sm.geo.attributes.position,col=sm.geo.attributes.color,cnt=pos.count;
    for(let i=0;i<cnt;i++){
      const lx=pos.getX(i)+sm.ox,lz=-pos.getY(i)+sm.oz;
      const wx=lx+stickerGroup.position.x,wz=lz+stickerGroup.position.z;
      const dist=Math.sqrt((wx-heatSourceWorld.x)**2+(wz-heatSourceWorld.z)**2);
      const reach=heatTime*0.42;
      let heat=0;
      if(dist<reach){heat=Math.max(0,1-dist/Math.max(reach,0.01));heat=Math.pow(heat,0.55);heat*=Math.min(1,(reach-dist)*2.2);}
      col.setXYZ(i,0.91+heat*0.09,0.27+heat*0.73,0.47+heat*0.53);
    }
    col.needsUpdate=true;
  });
}

// ===== DROP ZONE INDICATOR =====
function updateDropZone(){
  if(!dropZoneEl)return;
  if(currentStep!==0){dropZoneEl.style.display='none';return;}
  dropZoneEl.style.display='block';
  const cp=getClampScreenPos();
  const w=130,h=100;
  dropZoneEl.style.left=(cp.x-w/2)+'px';
  dropZoneEl.style.top=(cp.y-h/2)+'px';
  dropZoneEl.style.width=w+'px';
  dropZoneEl.style.height=h+'px';
}

// ===== ANIMATION =====
function animate(){
  requestAnimationFrame(animate);
  curRot.x+=(targetRot.x-curRot.x)*0.05;
  curRot.y+=(targetRot.y-curRot.y)*0.05;
  curZoom+=(targetZoom-curZoom)*0.05;
  camera.position.x=Math.sin(curRot.y)*Math.cos(curRot.x)*curZoom;
  camera.position.y=Math.sin(curRot.x)*curZoom+1.0;
  camera.position.z=Math.cos(curRot.y)*Math.cos(curRot.x)*curZoom;
  camera.lookAt(0,1.0,0);

  if(flameMesh){
    const t=Date.now();
    flameMesh.scale.x=1+Math.sin(t*0.013)*0.1;
    flameMesh.scale.y=1+Math.sin(t*0.016)*0.15;
    if(innerFlameMesh){innerFlameMesh.scale.x=1+Math.sin(t*0.017)*0.08;innerFlameMesh.scale.y=1+Math.cos(t*0.011)*0.12;}
    if(flameLight)flameLight.intensity=1.6+Math.sin(t*0.01)*0.3;
  }
  if(isHeating)updateHeat(0.016);

  // Update drop zone position each frame (camera may move)
  updateDropZone();

  renderer.render(scene,camera);
}

// ===== EVENTS =====
function setupEvents(){
  const cv=renderer.domElement;
  cv.addEventListener('mousedown',e=>{if(isDraggingCandle)return;isDragging=true;prevMouse.x=e.clientX;prevMouse.y=e.clientY;});
  cv.addEventListener('mousemove',e=>{
    if(isDragging&&!isDraggingCandle){
      targetRot.y-=(e.clientX-prevMouse.x)*0.005;
      targetRot.x=Math.max(-0.2,Math.min(0.9,targetRot.x+(e.clientY-prevMouse.y)*0.005));
      prevMouse.x=e.clientX;prevMouse.y=e.clientY;
    }
  });
  cv.addEventListener('mouseup',()=>{isDragging=false;});
  cv.addEventListener('mouseleave',()=>{isDragging=false;});
  cv.addEventListener('wheel',e=>{e.preventDefault();targetZoom=Math.max(2.5,Math.min(10,targetZoom+e.deltaY*0.004));},{passive:false});

  let ts=null,td=null;
  cv.addEventListener('touchstart',e=>{
    if(e.touches.length===1)ts={x:e.touches[0].clientX,y:e.touches[0].clientY};
    else if(e.touches.length===2)td=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  });
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&ts){
      targetRot.y-=(e.touches[0].clientX-ts.x)*0.005;
      targetRot.x=Math.max(-0.2,Math.min(0.9,targetRot.x+(e.touches[0].clientY-ts.y)*0.005));
      ts={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }else if(e.touches.length===2&&td){
      const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      targetZoom=Math.max(2.5,Math.min(10,targetZoom-(nd-td)*0.015));td=nd;
    }
  },{passive:false});
  cv.addEventListener('touchend',()=>{ts=null;td=null;});

  setupPlateDrag();
  setupCandleDrag();
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
}

// ===== PLATE DRAG - ghost follows cursor exactly =====
function setupPlateDrag(){
  document.querySelectorAll('.plate-option').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      if(currentStep!==0)return;
      e.preventDefault();
      const rect=el.getBoundingClientRect();
      const offX=e.clientX-rect.left, offY=e.clientY-rect.top;
      const ghost=el.cloneNode(true);
      ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.85;transform:scale(0.95);width:'+rect.width+'px;';
      document.body.appendChild(ghost);
      posGhost(ghost,e.clientX,e.clientY,offX,offY);

      const onM=ev=>{
        posGhost(ghost,ev.clientX,ev.clientY,offX,offY);
        // Highlight drop zone when near
        const cp=getClampScreenPos();
        const near=Math.hypot(ev.clientX-cp.x,ev.clientY-cp.y)<120;
        dropZoneEl.classList.toggle('highlight',near);
      };
      const onU=ev=>{
        document.removeEventListener('mousemove',onM);
        document.removeEventListener('mouseup',onU);
        ghost.remove();
        dropZoneEl.classList.remove('highlight');
        const cp=getClampScreenPos();
        if(Math.hypot(ev.clientX-cp.x,ev.clientY-cp.y)<120)handlePlateDrop(el.dataset.plate);
      };
      document.addEventListener('mousemove',onM);
      document.addEventListener('mouseup',onU);
    });

    el.addEventListener('touchstart',e=>{
      if(currentStep!==0)return;
      e.preventDefault();
      const t0=e.touches[0];
      const rect=el.getBoundingClientRect();
      const offX=t0.clientX-rect.left,offY=t0.clientY-rect.top;
      const ghost=el.cloneNode(true);
      ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.85;width:'+rect.width+'px;';
      document.body.appendChild(ghost);
      posGhost(ghost,t0.clientX,t0.clientY,offX,offY);

      const onM=ev=>{
        ev.preventDefault();
        posGhost(ghost,ev.touches[0].clientX,ev.touches[0].clientY,offX,offY);
        const cp=getClampScreenPos();
        dropZoneEl.classList.toggle('highlight',Math.hypot(ev.touches[0].clientX-cp.x,ev.touches[0].clientY-cp.y)<120);
      };
      const onE=ev=>{
        el.removeEventListener('touchmove',onM);el.removeEventListener('touchend',onE);
        ghost.remove();dropZoneEl.classList.remove('highlight');
        const ct=ev.changedTouches[0];const cp=getClampScreenPos();
        if(Math.hypot(ct.clientX-cp.x,ct.clientY-cp.y)<120)handlePlateDrop(el.dataset.plate);
      };
      el.addEventListener('touchmove',onM,{passive:false});
      el.addEventListener('touchend',onE);
    },{passive:false});
  });

  function posGhost(g,mx,my,ox,oy){
    g.style.left=(mx-ox)+'px';
    g.style.top=(my-oy)+'px';
  }
}

// ===== CANDLE DRAG =====
function setupCandleDrag(){
  const el=document.getElementById('candle-drag');if(!el)return;

  el.addEventListener('mousedown',e=>{
    if(currentStep!==1)return;
    e.preventDefault();e.stopPropagation();isDraggingCandle=true;
    const rect=el.getBoundingClientRect();
    const offX=e.clientX-rect.left,offY=e.clientY-rect.top;
    const ghost=el.cloneNode(true);
    ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.8;width:'+rect.width+'px;';
    document.body.appendChild(ghost);
    posG(ghost,e.clientX,e.clientY,offX,offY);
    let moved=false;const sx=e.clientX,sy=e.clientY;
    const onM=ev=>{posG(ghost,ev.clientX,ev.clientY,offX,offY);if(Math.hypot(ev.clientX-sx,ev.clientY-sy)>5)moved=true;};
    const onU=ev=>{document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);isDraggingCandle=false;ghost.remove();if(moved)handleCandleDrop(ev.clientX,ev.clientY);};
    document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);
  });

  el.addEventListener('touchstart',e=>{
    if(currentStep!==1)return;
    e.preventDefault();e.stopPropagation();isDraggingCandle=true;
    const t0=e.touches[0];
    const rect=el.getBoundingClientRect();
    const offX=t0.clientX-rect.left,offY=t0.clientY-rect.top;
    const ghost=el.cloneNode(true);
    ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.8;width:'+rect.width+'px;';
    document.body.appendChild(ghost);
    posG(ghost,t0.clientX,t0.clientY,offX,offY);
    let moved=false;const sx=t0.clientX,sy=t0.clientY;
    const onM=ev=>{ev.preventDefault();const tc=ev.touches[0];posG(ghost,tc.clientX,tc.clientY,offX,offY);if(Math.hypot(tc.clientX-sx,tc.clientY-sy)>5)moved=true;};
    const onE=ev=>{el.removeEventListener('touchmove',onM);el.removeEventListener('touchend',onE);isDraggingCandle=false;ghost.remove();const ct=ev.changedTouches[0];if(moved)handleCandleDrop(ct.clientX,ct.clientY);};
    el.addEventListener('touchmove',onM,{passive:false});el.addEventListener('touchend',onE);
  },{passive:false});

  function posG(g,mx,my,ox,oy){g.style.left=(mx-ox)+'px';g.style.top=(my-oy)+'px';}
}

// ===== HANDLERS =====
function handlePlateDrop(type){
  currentPlate=type;
  createPlateWithSticker(type);
  document.getElementById('side-panel').style.display='none';
  dropZoneEl.style.display='none';
  currentStep=1;updateDots();
  updateGuide('삼발이 위의 초를 구리판 아래 원하는 위치로 드래그해 주세요.\n초 위치에 따라 열이 이동하는 모습이 달라져요!');
  document.getElementById('candle-panel').style.display='block';
}

function handleCandleDrop(sx,sy){
  const rect=renderer.domElement.getBoundingClientRect();
  const nx=((sx-rect.left)/rect.width)*2-1,ny=-((sy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(new THREE.Vector2(nx,ny),camera);
  const hits=raycaster.intersectObject(groundPlane);
  if(hits.length>0){
    const pt=hits[0].point;
    const wx=Math.max(-3,Math.min(3,pt.x)),wz=Math.max(-2,Math.min(2,pt.z));
    buildTripodCandle(wx,wz);
    heatSourceWorld={x:wx,z:wz};
    resetStickerColors();heatTime=0;isHeating=true;
    document.getElementById('candle-panel').style.display='none';
    currentStep=2;updateDots();
    updateGuide('🔥 열 변색 붙임딱지의 색깔 변화를 관찰해 보세요!\n초에서 가까운 곳부터 색이 변하기 시작해요.');
    setTimeout(()=>{document.getElementById('next-btn').style.display='block';},7000);
  }
}

function resetStickerColors(){
  stickerMaterials.forEach(sm=>{const c=sm.geo.attributes.color,n=sm.geo.attributes.position.count;for(let i=0;i<n;i++)c.setXYZ(i,0.91,0.27,0.47);c.needsUpdate=true;});
}

function goToSummary(){document.getElementById('next-btn').style.display='none';document.getElementById('summary-overlay').style.display='flex';isHeating=false;}
function updateGuide(txt){const b=document.getElementById('guide-bubble');b.style.opacity='0';setTimeout(()=>{b.textContent=txt;b.style.opacity='1';},200);}
function updateDots(){for(let i=1;i<=3;i++){const d=document.getElementById('dot-'+i);d.className='step-dot';if(i<currentStep+1)d.classList.add('completed');if(i===currentStep+1)d.classList.add('active');}}

function resetExperiment(){
  if(plateGroup){scene.remove(plateGroup);plateGroup=null;}
  if(stickerGroup){scene.remove(stickerGroup);stickerGroup=null;}
  if(candleGroup){scene.remove(candleGroup);candleGroup=null;}
  stickerMaterials=[];flameMesh=null;flameLight=null;innerFlameMesh=null;
  currentStep=0;currentPlate=null;isHeating=false;heatTime=0;heatSourceWorld=null;
  document.getElementById('side-panel').style.display='flex';
  document.getElementById('candle-panel').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('summary-overlay').style.display='none';
  updateDots();
  updateGuide('열 변색 붙임딱지가 붙어 있는 구리판 중 하나를 골라 고정 집게 쪽으로 드래그해 주세요.');
  targetRot={x:0.25,y:-0.4};targetZoom=5.2;
}

init();
</script>
