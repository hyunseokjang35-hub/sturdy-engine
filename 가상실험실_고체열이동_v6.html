<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가상 실험실 - 고체에서 열의 이동</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;overflow:hidden;background:#1a1a2e;width:100vw;height:100vh}
#canvas-container{width:100%;height:100%;position:relative}
canvas{display:block}

#header{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,#00b894,#00cec9);display:flex;align-items:center;padding:0 20px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
#header .mascot-icon{width:36px;height:36px;background:#55efc4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px}
#header .title-badge{background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 14px;color:#fff;font-weight:700;font-size:14px;margin-right:14px}
#header .subtitle{color:#fff;font-size:13px;font-weight:500}

#step-indicator{position:absolute;top:64px;left:20px;display:flex;gap:6px;z-index:100}
.step-dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);transition:all .4s}
.step-dot.active{background:#00b894;color:#fff;box-shadow:0 3px 10px rgba(0,184,148,0.4)}
.step-dot.completed{background:#55efc4;color:#fff}

#guide-area{position:absolute;bottom:14px;left:14px;display:flex;flex-direction:column;align-items:flex-start;z-index:100;pointer-events:none}
#guide-bubble{background:#fff;border-radius:18px;padding:12px 20px;font-size:13.5px;font-weight:500;color:#2d3436;box-shadow:0 5px 20px rgba(0,0,0,0.18);max-width:400px;line-height:1.6;transition:opacity .35s;opacity:1;position:relative;white-space:pre-line}
#guide-bubble::after{content:'';position:absolute;bottom:-10px;left:36px;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #fff}
#character-wrap{margin-left:12px;margin-top:2px}
#character-svg{width:65px;height:65px}

#side-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:100}
.plate-option{width:118px;background:rgba(255,255,255,0.96);border-radius:14px;padding:10px;text-align:center;cursor:grab;transition:all .25s;box-shadow:0 3px 14px rgba(0,0,0,0.14);user-select:none}
.plate-option:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,0.22)}
.plate-option:active{cursor:grabbing}
.plate-preview{width:94px;height:60px;margin:0 auto 5px;display:flex;align-items:center;justify-content:center}
.plate-label{font-size:11px;font-weight:700;color:#2d3436}

#candle-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:100;display:none}
.candle-option{width:126px;background:rgba(255,255,255,0.96);border-radius:14px;padding:14px 10px;text-align:center;cursor:grab;box-shadow:0 3px 14px rgba(0,0,0,0.14);transition:all .25s;user-select:none}
.candle-option:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,0.22)}
.candle-option:active{cursor:grabbing}
.candle-icon-area{width:90px;height:95px;margin:0 auto 6px}
.candle-label{font-size:12px;font-weight:700;color:#2d3436}

#next-btn{position:absolute;bottom:20px;right:20px;padding:12px 28px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;z-index:100;box-shadow:0 4px 18px rgba(0,184,148,0.4);transition:all .25s;display:none}
#next-btn:hover{transform:translateY(-2px)}

#reset-btn{position:absolute;bottom:100px;left:18px;width:44px;height:44px;background:#222;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;transition:all .3s;color:#fff;font-size:20px;box-shadow:0 3px 12px rgba(0,0,0,0.4)}
#reset-btn:hover{background:#000;transform:rotate(-180deg)}

#drop-zone-indicator{position:absolute;pointer-events:none;z-index:50;display:block;border:3px dashed rgba(150,150,150,0.55);border-radius:16px;transition:border-color .3s}
#drop-zone-indicator.highlight{border-color:#00b894;box-shadow:0 0 18px rgba(0,184,148,0.35)}

#summary-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200}
#summary-card{background:#fff;border-radius:22px;padding:42px;max-width:520px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,0.3);animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#summary-card h2{font-size:22px;color:#00b894;margin-bottom:6px}
#summary-card .icon{font-size:44px;margin-bottom:12px}
#summary-card p{font-size:16px;color:#2d3436;line-height:1.8;margin-bottom:20px}
#summary-card .highlight{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;padding:14px 20px;border-radius:14px;font-size:15px;font-weight:700;line-height:1.6}
#summary-card button{margin-top:20px;padding:11px 28px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

#loading{position:absolute;top:0;left:0;right:0;bottom:0;background:#c8d6dc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;transition:opacity .5s}
.spinner{width:44px;height:44px;border:4px solid rgba(0,184,148,0.2);border-top-color:#00b894;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
#loading p{color:#555;margin-top:14px;font-weight:500}
</style>
</head>
<body>

<div id="canvas-container">

    <div id="character-wrap">

        <ellipse cx="50" cy="62" rx="30" ry="26" fill="#6BCB77"/>

        <circle cx="39" cy="53" r="5" fill="#2d3436"/>
        <circle cx="65" cy="53" r="5" fill="#2d3436"/>
        <circle cx="41" cy="51" r="2" fill="#fff"/>
        <circle cx="67" cy="51" r="2" fill="#fff"/>
        <path d="M43,68 Q50,76 57,68" stroke="#2d3436" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="22" cy="65" rx="7" ry="4.5" fill="#6BCB77"/>
        <ellipse cx="78" cy="60" rx="7" ry="4.5" fill="#6BCB77" transform="rotate(-15 78 60)"/>
        <rect x="37" y="86" width="9" height="7" rx="3" fill="#FF8C00"/>
        <rect x="54" y="86" width="9" height="7" rx="3" fill="#FF8C00"/>

  <div id="side-panel">

</div>

<div id="summary-overlay">
  <div id="summary-card">
    <div class="icon">🔥</div>
    <h2>실험 결과 정리</h2>
    <p>세 가지 모양의 구리판에서 열의 이동을 관찰했어요!</p>
    <div class="highlight">고체에서는 온도가 높은 곳에서 온도가 낮은 곳으로<br>물체를 따라 열이 이동합니다.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Helper: safe mesh creation
function M(geo, mat, x, y, z){
  var m = new THREE.Mesh(geo, mat);
  m.position.set(x||0, y||0, z||0);
  m.castShadow = true;
  return m;
}
function MR(geo, mat, x, y, z, rx, ry, rz){
  var m = M(geo, mat, x, y, z);
  m.rotation.set(rx||0, ry||0, rz||0);
  return m;
}

var currentStep=0, currentPlate=null, isHeating=false, heatTime=0, heatSourceWorld=null;
var scene, camera, renderer;
var standGroup, plateGroup, stickerGroup, candleGroup;
var stickerMaterials=[];
var flameMesh, flameLight, innerFlameMesh;
var isDragging=false, prevMouse={x:0,y:0};
var targetRot={x:0.25,y:-0.4}, curRot={x:0.25,y:-0.4};
var targetZoom=5.2, curZoom=5.2;
var raycaster, groundPlane;
var isDraggingCandle=false;
var dropZoneEl;

var STAND_OFFSET = new THREE.Vector3(-1.2, 0, 0);
var CLAMP_TIP_LOCAL = new THREE.Vector3(0.75, 1.35, 0);

function getClampWorldPos(){ return CLAMP_TIP_LOCAL.clone().add(STAND_OFFSET); }
function getClampScreenPos(){
  var wp = getClampWorldPos();
  var sp = wp.clone().project(camera);
  return { x: (sp.x*0.5+0.5)*window.innerWidth, y: (-sp.y*0.5+0.5)*window.innerHeight };
}

function init(){
  raycaster = new THREE.Raycaster();
  scene = new THREE.Scene();

  // Background
  var bgC = document.createElement('canvas'); bgC.width=512; bgC.height=512;
  var bgx = bgC.getContext('2d');
  var gr = bgx.createLinearGradient(0,0,0,512);
  gr.addColorStop(0,'#e8f0f2'); gr.addColorStop(0.45,'#d5e2e8'); gr.addColorStop(1,'#c0d0d8');
  bgx.fillStyle = gr; bgx.fillRect(0,0,512,512);
  scene.background = new THREE.CanvasTexture(bgC);

  camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 100);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  var dl = new THREE.DirectionalLight(0xffffff, 0.75);
  dl.position.set(4,8,5); dl.castShadow=true;
  dl.shadow.mapSize.set(2048,2048);
  dl.shadow.camera.near=0.5; dl.shadow.camera.far=25;
  dl.shadow.camera.left=-6; dl.shadow.camera.right=6;
  dl.shadow.camera.top=6; dl.shadow.camera.bottom=-6;
  scene.add(dl);
  var fl2 = new THREE.DirectionalLight(0x99bbdd, 0.25);
  fl2.position.set(-3,3,-2); scene.add(fl2);

  // Floor
  var floorMat = new THREE.MeshStandardMaterial({color:0xb8ccd6, roughness:0.7, metalness:0.05});
  var floor = new THREE.Mesh(new THREE.PlaneGeometry(20,20), floorMat);
  floor.rotation.x = -Math.PI/2; floor.position.y = -0.01; floor.receiveShadow=true;
  scene.add(floor);

  // Ground plane for raycasting
  var gpMat = new THREE.MeshBasicMaterial({visible:false, side:THREE.DoubleSide});
  groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(40,40), gpMat);
  groundPlane.rotation.x = -Math.PI/2; groundPlane.position.y = 0.02;
  scene.add(groundPlane);

  dropZoneEl = document.getElementById('drop-zone-indicator');
  buildStand();
  setupEvents();
  updateDropZone();

  setTimeout(function(){
    document.getElementById('loading').style.opacity='0';
    setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 500);
  }, 500);
  animate();
}

// ===== STAND =====
function buildStand(){
  standGroup = new THREE.Group();
  // Chrome steel material
  var chrome = new THREE.MeshStandardMaterial({color:0xcccccc, roughness:0.12, metalness:0.95});
  var dark = new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.4, metalness:0.35});
  var blue = new THREE.MeshStandardMaterial({color:0x2065c9, roughness:0.35, metalness:0.2});
  var nutMat = new THREE.MeshStandardMaterial({color:0x888888, roughness:0.25, metalness:0.85});

  // Black base
  standGroup.add(M(new THREE.BoxGeometry(2.0,0.13,1.4), dark, 0, 0.1, 0));
  // Feet
  var fxs=[-0.8,0.8], fzs=[-0.55,0.55];
  for(var fi=0;fi<fxs.length;fi++) for(var fj=0;fj<fzs.length;fj++){
    standGroup.add(M(new THREE.BoxGeometry(0.15,0.06,0.15), dark, fxs[fi], 0.02, fzs[fj]));
  }

  // Vertical pole - chrome
  standGroup.add(M(new THREE.CylinderGeometry(0.05,0.05,3.2,24), chrome, -0.2, 1.77, 0));

  // Horizontal bar - chrome, SHORT
  standGroup.add(MR(new THREE.CylinderGeometry(0.032,0.032,0.7,16), chrome, 0.0, 1.35, 0, 0, 0, Math.PI/2));

  // Clamp block
  standGroup.add(M(new THREE.BoxGeometry(0.16,0.16,0.20), dark, -0.05, 1.35, 0));

  // Knobs
  standGroup.add(MR(new THREE.CylinderGeometry(0.05,0.05,0.07,12), dark, -0.05, 1.41, 0.13, Math.PI/2, 0, 0));
  standGroup.add(MR(new THREE.CylinderGeometry(0.05,0.05,0.07,12), dark, -0.05, 1.29, 0.13, Math.PI/2, 0, 0));

  // Short chrome arm to blue clamp
  standGroup.add(MR(new THREE.CylinderGeometry(0.02,0.02,0.3,8), chrome, 0.25, 1.35, 0, 0, 0, Math.PI/2));

  // Pivot bolt
  var pivotX = 0.48;
  standGroup.add(MR(new THREE.CylinderGeometry(0.02,0.02,0.26,8), chrome, pivotX, 1.35, 0, Math.PI/2, 0, 0));
  // Hex nuts
  standGroup.add(MR(new THREE.CylinderGeometry(0.032,0.032,0.025,6), nutMat, pivotX, 1.35, 0.14, Math.PI/2, 0, 0));
  standGroup.add(MR(new THREE.CylinderGeometry(0.032,0.032,0.025,6), nutMat, pivotX, 1.35, -0.14, Math.PI/2, 0, 0));

  // Blue jaws
  var jawUp = M(new THREE.BoxGeometry(0.3,0.045,0.18), blue, 0.68, 1.40, 0);
  jawUp.rotation.z = 0.05; standGroup.add(jawUp);
  var jawDn = M(new THREE.BoxGeometry(0.3,0.045,0.18), blue, 0.68, 1.30, 0);
  jawDn.rotation.z = -0.05; standGroup.add(jawDn);

  // Rounded tips
  var tipGeo = new THREE.SphereGeometry(0.035,8,8);
  var tU = M(tipGeo, blue, 0.82, 1.41, 0); tU.scale.set(1,0.6,1.4); standGroup.add(tU);
  var tD = M(tipGeo, blue, 0.82, 1.29, 0); tD.scale.set(1,0.6,1.4); standGroup.add(tD);

  // Screw below
  standGroup.add(M(new THREE.CylinderGeometry(0.014,0.014,0.08,6), chrome, 0.68, 1.24, 0));
  standGroup.add(M(new THREE.SphereGeometry(0.024,6,6), nutMat, 0.68, 1.20, 0));

  standGroup.position.copy(STAND_OFFSET);
  scene.add(standGroup);
}

// ===== PLATES =====
function createPlateWithSticker(type){
  if(plateGroup) scene.remove(plateGroup);
  if(stickerGroup) scene.remove(stickerGroup);
  plateGroup = new THREE.Group();
  stickerGroup = new THREE.Group();
  stickerMaterials = [];
  var copper = new THREE.MeshStandardMaterial({color:0xd4845a, roughness:0.3, metalness:0.7});
  var t = 0.018;
  var cw = getClampWorldPos();

  if(type==='bar'){
    plateGroup.add(M(new THREE.BoxGeometry(3,t,0.45), copper, 0,0,0));
    createStickerQuad(3, 0.45, 0, 0);
  } else if(type==='square'){
    plateGroup.add(M(new THREE.BoxGeometry(1.7,t,1.7), copper, 0,0,0));
    createStickerQuad(1.7, 1.7, 0, 0);
  } else {
    plateGroup.add(M(new THREE.BoxGeometry(1.7,t,0.32), copper, 0,0,-0.69));
    plateGroup.add(M(new THREE.BoxGeometry(1.7,t,0.32), copper, 0,0,0.69));
    plateGroup.add(M(new THREE.BoxGeometry(0.32,t,1.7), copper, -0.69,0,0));
    createStickerQuad(1.7, 0.32, 0, -0.69);
    createStickerQuad(1.7, 0.32, 0, 0.69);
    createStickerQuad(0.32, 1.7, -0.69, 0);
  }

  plateGroup.position.set(cw.x+0.8, cw.y, 0);
  stickerGroup.position.set(cw.x+0.8, cw.y+t/2+0.003, 0);
  scene.add(plateGroup); scene.add(stickerGroup);
}

function createStickerQuad(w,h,ox,oz){
  var sx=Math.max(6,Math.round(w*14)), sz=Math.max(6,Math.round(h*14));
  var geo=new THREE.PlaneGeometry(w*0.97, h*0.97, sx, sz);
  var cnt=geo.attributes.position.count;
  var cols=new Float32Array(cnt*3);
  for(var i=0;i<cnt;i++){cols[i*3]=0.91;cols[i*3+1]=0.27;cols[i*3+2]=0.47;}
  geo.setAttribute('color', new THREE.BufferAttribute(cols,3));
  var mat=new THREE.MeshStandardMaterial({vertexColors:true, roughness:0.55, metalness:0.03, side:THREE.DoubleSide});
  var mesh=new THREE.Mesh(geo, mat);
  mesh.rotation.x=-Math.PI/2; mesh.position.set(ox,0,oz);
  stickerGroup.add(mesh);
  stickerMaterials.push({mesh:mesh, geo:geo, w:w, h:h, ox:ox, oz:oz});
}

// ===== TRIPOD + CANDLE =====
function buildTripodCandle(wx, wz){
  if(candleGroup) scene.remove(candleGroup);
  candleGroup = new THREE.Group();
  var legMat = new THREE.MeshStandardMaterial({color:0xc8c8c8, roughness:0.2, metalness:0.9});

  var legs=[
    {tx:-0.12,tz:-0.12,bx:-0.3,bz:-0.3},
    {tx:0.12,tz:-0.12,bx:0.3,bz:-0.3},
    {tx:-0.12,tz:0.12,bx:-0.3,bz:0.3},
    {tx:0.12,tz:0.12,bx:0.3,bz:0.3}
  ];
  for(var li=0;li<legs.length;li++){
    var lp=legs[li];
    var dx=lp.bx-lp.tx, dz=lp.bz-lp.tz, dy=-0.65;
    var len=Math.sqrt(dx*dx+dy*dy+dz*dz);
    var leg=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.014,len,6), legMat);
    leg.position.set((lp.tx+lp.bx)/2, 0.65/2, (lp.tz+lp.bz)/2);
    var dir=new THREE.Vector3(dx,dy,dz).normalize();
    var q=new THREE.Quaternion();
    q.setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    leg.setRotationFromQuaternion(q);
    leg.castShadow=true; candleGroup.add(leg);
  }

  // Ring
  var ring=new THREE.Mesh(new THREE.TorusGeometry(0.15,0.01,8,24), legMat);
  ring.position.set(0, 0.65, 0); ring.rotation.x=Math.PI/2;
  candleGroup.add(ring);

  // Gauze
  var gauzeMat=new THREE.MeshStandardMaterial({color:0xb5b5b5, roughness:0.45, metalness:0.55, transparent:true, opacity:0.65});
  var gauze=new THREE.Mesh(new THREE.PlaneGeometry(0.42,0.42), gauzeMat);
  gauze.position.set(0, 0.66, 0); gauze.rotation.x=-Math.PI/2;
  candleGroup.add(gauze);

  // Wires
  var wireMat=new THREE.MeshBasicMaterial({color:0x999999});
  for(var wi=-4;wi<=4;wi++){
    var wh=new THREE.Mesh(new THREE.BoxGeometry(0.40,0.003,0.004), wireMat);
    wh.position.set(0, 0.665, wi*0.045); candleGroup.add(wh);
    var wv=new THREE.Mesh(new THREE.BoxGeometry(0.004,0.003,0.40), wireMat);
    wv.position.set(wi*0.045, 0.665, 0); candleGroup.add(wv);
  }

  // Dish
  var dish=new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.1,0.015,20), new THREE.MeshStandardMaterial({color:0xf0f0f0, roughness:0.4}));
  dish.position.y=0.675; candleGroup.add(dish);

  // Tin
  var tin=new THREE.Mesh(new THREE.CylinderGeometry(0.068,0.068,0.02,18), new THREE.MeshStandardMaterial({color:0xcccccc, roughness:0.25, metalness:0.8}));
  tin.position.y=0.695; candleGroup.add(tin);

  // Candle body
  var cBody=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.065,0.14,18), new THREE.MeshStandardMaterial({color:0xf0ece0, roughness:0.65, transparent:true, opacity:0.88}));
  cBody.position.y=0.755; cBody.castShadow=true; candleGroup.add(cBody);

  // Inner wick
  var wickI=new THREE.Mesh(new THREE.CylinderGeometry(0.003,0.003,0.14,4), new THREE.MeshBasicMaterial({color:0x444444}));
  wickI.position.y=0.755; candleGroup.add(wickI);

  // Wick above
  var wick=new THREE.Mesh(new THREE.CylinderGeometry(0.003,0.002,0.04,4), new THREE.MeshBasicMaterial({color:0x333333}));
  wick.position.y=0.845; candleGroup.add(wick);

  // Flame
  var fGeo=new THREE.SphereGeometry(0.035,10,14); fGeo.scale(1,2.4,1);
  flameMesh=new THREE.Mesh(fGeo, new THREE.MeshBasicMaterial({color:0xfdcb6e, transparent:true, opacity:0.9}));
  flameMesh.position.y=0.91; candleGroup.add(flameMesh);

  var ifGeo=new THREE.SphereGeometry(0.018,8,10); ifGeo.scale(1,2.0,1);
  innerFlameMesh=new THREE.Mesh(ifGeo, new THREE.MeshBasicMaterial({color:0xfff8ee, transparent:true, opacity:0.95}));
  innerFlameMesh.position.y=0.92; candleGroup.add(innerFlameMesh);

  flameLight=new THREE.PointLight(0xff9500, 1.6, 4);
  flameLight.position.y=0.91; candleGroup.add(flameLight);

  candleGroup.position.set(wx, 0.02, wz);
  scene.add(candleGroup);
}

// ===== HEAT =====
function updateHeat(dt){
  if(!isHeating||!heatSourceWorld||!stickerMaterials.length) return;
  heatTime += dt;
  for(var si=0; si<stickerMaterials.length; si++){
    var sm=stickerMaterials[si];
    var pos=sm.geo.attributes.position, col=sm.geo.attributes.color, cnt=pos.count;
    for(var i=0;i<cnt;i++){
      var lx=pos.getX(i)+sm.ox, lz=-pos.getY(i)+sm.oz;
      var wx2=lx+stickerGroup.position.x, wz2=lz+stickerGroup.position.z;
      var dist=Math.sqrt((wx2-heatSourceWorld.x)*(wx2-heatSourceWorld.x)+(wz2-heatSourceWorld.z)*(wz2-heatSourceWorld.z));
      var reach=heatTime*0.42;
      var heat=0;
      if(dist<reach){ heat=Math.max(0,1-dist/Math.max(reach,0.01)); heat=Math.pow(heat,0.55); heat*=Math.min(1,(reach-dist)*2.2); }
      col.setXYZ(i, 0.91+heat*0.09, 0.27+heat*0.73, 0.47+heat*0.53);
    }
    col.needsUpdate=true;
  }
}

// ===== DROP ZONE =====
function updateDropZone(){
  if(!dropZoneEl) return;
  if(currentStep!==0){ dropZoneEl.style.display='none'; return; }
  dropZoneEl.style.display='block';
  var cp=getClampScreenPos();
  var w=120, h=90;
  dropZoneEl.style.left=(cp.x-w/2)+'px'; dropZoneEl.style.top=(cp.y-h/2)+'px';
  dropZoneEl.style.width=w+'px'; dropZoneEl.style.height=h+'px';
}

// ===== ANIMATION =====
function animate(){
  requestAnimationFrame(animate);
  curRot.x+=(targetRot.x-curRot.x)*0.05;
  curRot.y+=(targetRot.y-curRot.y)*0.05;
  curZoom+=(targetZoom-curZoom)*0.05;
  camera.position.x=Math.sin(curRot.y)*Math.cos(curRot.x)*curZoom;
  camera.position.y=Math.sin(curRot.x)*curZoom+1.0;
  camera.position.z=Math.cos(curRot.y)*Math.cos(curRot.x)*curZoom;
  camera.lookAt(0,1.0,0);
  if(flameMesh){
    var t=Date.now();
    flameMesh.scale.x=1+Math.sin(t*0.013)*0.1; flameMesh.scale.y=1+Math.sin(t*0.016)*0.15;
    if(innerFlameMesh){ innerFlameMesh.scale.x=1+Math.sin(t*0.017)*0.08; innerFlameMesh.scale.y=1+Math.cos(t*0.011)*0.12; }
    if(flameLight) flameLight.intensity=1.6+Math.sin(t*0.01)*0.3;
  }
  if(isHeating) updateHeat(0.016);
  updateDropZone();
  renderer.render(scene,camera);
}

// ===== EVENTS =====
function setupEvents(){
  var cv=renderer.domElement;
  cv.addEventListener('mousedown',function(e){if(isDraggingCandle)return;isDragging=true;prevMouse.x=e.clientX;prevMouse.y=e.clientY;});
  cv.addEventListener('mousemove',function(e){
    if(isDragging&&!isDraggingCandle){
      targetRot.y-=(e.clientX-prevMouse.x)*0.005;
      targetRot.x=Math.max(-0.2,Math.min(0.9,targetRot.x+(e.clientY-prevMouse.y)*0.005));
      prevMouse.x=e.clientX;prevMouse.y=e.clientY;
    }
  });
  cv.addEventListener('mouseup',function(){isDragging=false;});
  cv.addEventListener('mouseleave',function(){isDragging=false;});
  cv.addEventListener('wheel',function(e){e.preventDefault();targetZoom=Math.max(2.5,Math.min(10,targetZoom+e.deltaY*0.004));},{passive:false});

  var ts=null, td=null;
  cv.addEventListener('touchstart',function(e){
    if(e.touches.length===1) ts={x:e.touches[0].clientX,y:e.touches[0].clientY};
    else if(e.touches.length===2) td=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  });
  cv.addEventListener('touchmove',function(e){
    e.preventDefault();
    if(e.touches.length===1&&ts){
      targetRot.y-=(e.touches[0].clientX-ts.x)*0.005;
      targetRot.x=Math.max(-0.2,Math.min(0.9,targetRot.x+(e.touches[0].clientY-ts.y)*0.005));
      ts={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }else if(e.touches.length===2&&td){
      var nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      targetZoom=Math.max(2.5,Math.min(10,targetZoom-(nd-td)*0.015)); td=nd;
    }
  },{passive:false});
  cv.addEventListener('touchend',function(){ts=null;td=null;});

  setupPlateDrag();
  setupCandleDrag();
  window.addEventListener('resize',function(){camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
}

// ===== PLATE DRAG =====
function setupPlateDrag(){
  var plates=document.querySelectorAll('.plate-option');
  for(var pi=0;pi<plates.length;pi++){
    (function(el){
      el.addEventListener('mousedown',function(e){
        if(currentStep!==0)return; e.preventDefault();
        var rect=el.getBoundingClientRect();
        var offX=e.clientX-rect.left, offY=e.clientY-rect.top;
        var ghost=el.cloneNode(true);
        ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.85;transform:scale(0.95);width:'+rect.width+'px;';
        document.body.appendChild(ghost);
        posG(ghost,e.clientX,e.clientY,offX,offY);
        function onM(ev){posG(ghost,ev.clientX,ev.clientY,offX,offY);var cp=getClampScreenPos();dropZoneEl.classList.toggle('highlight',Math.hypot(ev.clientX-cp.x,ev.clientY-cp.y)<120);}
        function onU(ev){document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);ghost.remove();dropZoneEl.classList.remove('highlight');var cp=getClampScreenPos();if(Math.hypot(ev.clientX-cp.x,ev.clientY-cp.y)<120)handlePlateDrop(el.dataset.plate);}
        document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);
      });
      el.addEventListener('touchstart',function(e){
        if(currentStep!==0)return; e.preventDefault();
        var t0=e.touches[0]; var rect=el.getBoundingClientRect();
        var offX=t0.clientX-rect.left, offY=t0.clientY-rect.top;
        var ghost=el.cloneNode(true);
        ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.85;width:'+rect.width+'px;';
        document.body.appendChild(ghost); posG(ghost,t0.clientX,t0.clientY,offX,offY);
        function onM(ev){ev.preventDefault();posG(ghost,ev.touches[0].clientX,ev.touches[0].clientY,offX,offY);var cp=getClampScreenPos();dropZoneEl.classList.toggle('highlight',Math.hypot(ev.touches[0].clientX-cp.x,ev.touches[0].clientY-cp.y)<120);}
        function onE(ev){el.removeEventListener('touchmove',onM);el.removeEventListener('touchend',onE);ghost.remove();dropZoneEl.classList.remove('highlight');var ct=ev.changedTouches[0];var cp=getClampScreenPos();if(Math.hypot(ct.clientX-cp.x,ct.clientY-cp.y)<120)handlePlateDrop(el.dataset.plate);}
        el.addEventListener('touchmove',onM,{passive:false});el.addEventListener('touchend',onE);
      },{passive:false});
    })(plates[pi]);
  }
  function posG(g,mx,my,ox,oy){g.style.left=(mx-ox)+'px';g.style.top=(my-oy)+'px';}
}

// ===== CANDLE DRAG =====
function setupCandleDrag(){
  var el=document.getElementById('candle-drag'); if(!el)return;

  function screenToWorld(sx, sy){
    var rect=renderer.domElement.getBoundingClientRect();
    var nx=((sx-rect.left)/rect.width)*2-1;
    var ny=-((sy-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(new THREE.Vector2(nx,ny), camera);
    var hits=raycaster.intersectObject(groundPlane);
    if(hits.length>0){
      var pt=hits[0].point;
      return{x:Math.max(-3.5,Math.min(3.5,pt.x)), z:Math.max(-2.2,Math.min(2.2,pt.z))};
    }
    // Fallback: manual y=0 intersection
    var o=raycaster.ray.origin, d=raycaster.ray.direction;
    if(Math.abs(d.y)>0.0001){
      var t2=(0.02-o.y)/d.y;
      if(t2>0) return{x:Math.max(-3.5,Math.min(3.5,o.x+d.x*t2)), z:Math.max(-2.2,Math.min(2.2,o.z+d.z*t2))};
    }
    return null;
  }

  el.addEventListener('mousedown',function(e){
    if(currentStep!==1)return;
    e.preventDefault(); e.stopPropagation(); isDraggingCandle=true;
    var rect=el.getBoundingClientRect();
    var offX=e.clientX-rect.left, offY=e.clientY-rect.top;
    var ghost=el.cloneNode(true);
    ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.8;width:'+rect.width+'px;';
    document.body.appendChild(ghost);
    cGhost(ghost,e.clientX,e.clientY,offX,offY);
    var moved=false, sx=e.clientX, sy=e.clientY;
    function onM(ev){cGhost(ghost,ev.clientX,ev.clientY,offX,offY);if(Math.hypot(ev.clientX-sx,ev.clientY-sy)>5)moved=true;}
    function onU(ev){
      document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);
      isDraggingCandle=false; ghost.remove();
      if(moved){var pos=screenToWorld(ev.clientX,ev.clientY);if(pos)placeCandle(pos.x,pos.z);}
    }
    document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);
  });

  el.addEventListener('touchstart',function(e){
    if(currentStep!==1)return;
    e.preventDefault(); e.stopPropagation(); isDraggingCandle=true;
    var t0=e.touches[0]; var rect=el.getBoundingClientRect();
    var offX=t0.clientX-rect.left, offY=t0.clientY-rect.top;
    var ghost=el.cloneNode(true);
    ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.8;width:'+rect.width+'px;';
    document.body.appendChild(ghost);
    cGhost(ghost,t0.clientX,t0.clientY,offX,offY);
    var moved=false, sx=t0.clientX, sy=t0.clientY;
    function onM(ev){ev.preventDefault();var tc=ev.touches[0];cGhost(ghost,tc.clientX,tc.clientY,offX,offY);if(Math.hypot(tc.clientX-sx,tc.clientY-sy)>5)moved=true;}
    function onE(ev){el.removeEventListener('touchmove',onM);el.removeEventListener('touchend',onE);isDraggingCandle=false;ghost.remove();var ct=ev.changedTouches[0];if(moved){var pos=screenToWorld(ct.clientX,ct.clientY);if(pos)placeCandle(pos.x,pos.z);}}
    el.addEventListener('touchmove',onM,{passive:false});el.addEventListener('touchend',onE);
  },{passive:false});

  function cGhost(g,mx,my,ox,oy){g.style.left=(mx-ox)+'px';g.style.top=(my-oy)+'px';}
}

function placeCandle(wx,wz){
  buildTripodCandle(wx,wz);
  heatSourceWorld={x:wx,z:wz};
  resetStickerColors(); heatTime=0; isHeating=true;
  document.getElementById('candle-panel').style.display='none';
  currentStep=2; updateDots();
  updateGuide('🔥 열 변색 붙임딱지의 색깔 변화를 관찰해 보세요!\n초에서 가까운 곳부터 색이 변하기 시작해요.');
  setTimeout(function(){document.getElementById('next-btn').style.display='block';},7000);
}

function handlePlateDrop(type){
  currentPlate=type; createPlateWithSticker(type);
  document.getElementById('side-panel').style.display='none'; dropZoneEl.style.display='none';
  currentStep=1; updateDots();
  updateGuide('삼발이 위의 초를 구리판 아래 원하는 위치로 드래그해 주세요.\n초 위치에 따라 열이 이동하는 모습이 달라져요!');
  document.getElementById('candle-panel').style.display='block';
}
function resetStickerColors(){for(var si=0;si<stickerMaterials.length;si++){var sm=stickerMaterials[si];var c=sm.geo.attributes.color,n=sm.geo.attributes.position.count;for(var i=0;i<n;i++)c.setXYZ(i,0.91,0.27,0.47);c.needsUpdate=true;}}
function goToSummary(){document.getElementById('next-btn').style.display='none';document.getElementById('summary-overlay').style.display='flex';isHeating=false;}
function updateGuide(txt){var b=document.getElementById('guide-bubble');b.style.opacity='0';setTimeout(function(){b.textContent=txt;b.style.opacity='1';},200);}
function updateDots(){for(var i=1;i<=3;i++){var d=document.getElementById('dot-'+i);d.className='step-dot';if(i<currentStep+1)d.classList.add('completed');if(i===currentStep+1)d.classList.add('active');}}

function resetExperiment(){
  if(plateGroup){scene.remove(plateGroup);plateGroup=null;}
  if(stickerGroup){scene.remove(stickerGroup);stickerGroup=null;}
  if(candleGroup){scene.remove(candleGroup);candleGroup=null;}
  stickerMaterials=[];flameMesh=null;flameLight=null;innerFlameMesh=null;
  currentStep=0;currentPlate=null;isHeating=false;heatTime=0;heatSourceWorld=null;
  document.getElementById('side-panel').style.display='flex';
  document.getElementById('candle-panel').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('summary-overlay').style.display='none';
  updateDots(); updateGuide('열 변색 붙임딱지가 붙어 있는 구리판 중 하나를 골라 고정 집게 쪽으로 드래그해 주세요.');
  targetRot={x:0.25,y:-0.4}; targetZoom=5.2;
}

init();
</script>
