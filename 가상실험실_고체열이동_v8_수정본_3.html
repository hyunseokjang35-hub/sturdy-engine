<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가상 실험실 - 고체에서 열의 이동</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;overflow:hidden;width:100vw;height:100vh}
#canvas-container{width:100%;height:100%;position:relative}
canvas{display:block}
#header{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,#00b894,#00cec9);display:flex;align-items:center;padding:0 20px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
#header .mascot-icon{width:36px;height:36px;background:#55efc4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px}
#header .title-badge{background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 14px;color:#fff;font-weight:700;font-size:14px;margin-right:14px}
#header .subtitle{color:#fff;font-size:13px;font-weight:500}
#step-indicator{position:absolute;top:64px;left:20px;display:flex;gap:6px;z-index:100}
.step-dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);transition:all .4s}
.step-dot.active{background:#00b894;color:#fff;box-shadow:0 3px 10px rgba(0,184,148,0.4)}
.step-dot.completed{background:#55efc4;color:#fff}
#guide-area{position:absolute;bottom:140px;left:14px;display:flex;flex-direction:column;align-items:flex-start;z-index:100;pointer-events:none}
#guide-bubble{background:#fff;border-radius:18px;padding:12px 20px;font-size:13.5px;font-weight:500;color:#2d3436;box-shadow:0 5px 20px rgba(0,0,0,0.18);max-width:380px;line-height:1.6;transition:opacity .35s;opacity:1;position:relative;white-space:pre-line}
#guide-bubble::after{content:'';position:absolute;bottom:-10px;left:36px;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #fff}
#character-wrap{margin-left:12px;margin-top:2px}
#character-svg{width:60px;height:60px}
#side-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:100}
.plate-option{width:118px;background:rgba(255,255,255,0.96);border-radius:14px;padding:10px;text-align:center;cursor:grab;transition:all .25s;box-shadow:0 3px 14px rgba(0,0,0,0.14);user-select:none}
.plate-option:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,0.22)}
.plate-preview{width:94px;height:60px;margin:0 auto 5px;display:flex;align-items:center;justify-content:center}
.plate-label{font-size:11px;font-weight:700;color:#2d3436}
#candle-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:100;display:none}
.candle-option{width:126px;background:rgba(255,255,255,0.96);border-radius:14px;padding:14px 10px;text-align:center;cursor:grab;box-shadow:0 3px 14px rgba(0,0,0,0.14);transition:all .25s;user-select:none}
.candle-option:hover{transform:scale(1.05)}
.candle-option.empty{cursor:pointer;border:3px dashed #bbb;box-shadow:none}
.candle-option.empty:hover{border-color:#00b894}
.candle-icon-area{width:90px;height:95px;margin:0 auto 6px}
.candle-label{font-size:12px;font-weight:700;color:#2d3436}
.empty-placeholder{width:90px;height:95px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:28px}
#next-btn{position:absolute;bottom:20px;right:20px;padding:12px 28px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;z-index:100;box-shadow:0 4px 18px rgba(0,184,148,0.4);display:none}
#next-btn:hover{transform:translateY(-2px)}
#reset-btn{position:absolute;bottom:20px;left:18px;width:44px;height:44px;background:#222;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;color:#fff;font-size:20px;box-shadow:0 3px 12px rgba(0,0,0,0.4);transition:all .3s}
#reset-btn:hover{background:#000;transform:rotate(-180deg)}
#drop-zone-indicator{position:absolute;pointer-events:none;z-index:50;border:3px dashed rgba(150,150,150,0.55);border-radius:16px;transition:border-color .3s}
#drop-zone-indicator.highlight{border-color:#00b894;box-shadow:0 0 18px rgba(0,184,148,0.35)}
#summary-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200}
#summary-card{background:#fff;border-radius:22px;padding:42px;max-width:520px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,0.3);animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#summary-card h2{font-size:22px;color:#00b894;margin-bottom:6px}
#summary-card .icon{font-size:44px;margin-bottom:12px}
#summary-card p{font-size:16px;color:#2d3436;line-height:1.8;margin-bottom:20px}
#summary-card .highlight{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;padding:14px 20px;border-radius:14px;font-size:15px;font-weight:700;line-height:1.6}
#summary-card button{margin-top:20px;padding:11px 28px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
#loading{position:absolute;top:0;left:0;right:0;bottom:0;background:#c8d6dc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;transition:opacity .5s}
.spinner{width:44px;height:44px;border:4px solid rgba(0,184,148,0.2);border-top-color:#00b894;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
#loading p{color:#555;margin-top:14px;font-weight:500}
#speed-bar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:6px;background:rgba(255,255,255,0.96);border-radius:14px;padding:8px 14px;z-index:100;box-shadow:0 3px 14px rgba(0,0,0,0.14);white-space:nowrap}
.speed-label{font-size:12px;font-weight:700;color:#636e72;margin-right:2px}
.speed-btn{padding:5px 11px;border:2px solid #ddd;border-radius:8px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;color:#636e72;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.speed-btn:hover{border-color:#00b894;color:#00b894}
.speed-btn.active{background:#00b894;border-color:#00b894;color:#fff}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>가상 실험실을 준비하고 있어요...</p></div>
<div id="canvas-container">
  <div id="header"><div class="mascot-icon">🔬</div><div class="title-badge">가상 실험실</div><div class="subtitle">고체에서 열의 이동 관찰하기</div></div>
  <div id="step-indicator"><div class="step-dot active" id="dot-1">1</div><div class="step-dot" id="dot-2">2</div><div class="step-dot" id="dot-3">3</div></div>
  <div id="guide-area">
    <div id="guide-bubble">구리판 한 개를 골라 고정 집게 쪽으로 옮겨 보세요.</div>
    <div id="character-wrap"><svg id="character-svg" viewBox="0 0 100 110"><ellipse cx="50" cy="62" rx="30" ry="26" fill="#6BCB77"/><ellipse cx="37" cy="52" rx="9" ry="10" fill="#fff"/><ellipse cx="63" cy="52" rx="9" ry="10" fill="#fff"/><circle cx="39" cy="53" r="5" fill="#2d3436"/><circle cx="65" cy="53" r="5" fill="#2d3436"/><circle cx="41" cy="51" r="2" fill="#fff"/><circle cx="67" cy="51" r="2" fill="#fff"/><path d="M43,68 Q50,76 57,68" stroke="#2d3436" stroke-width="2" fill="none" stroke-linecap="round"/><ellipse cx="22" cy="65" rx="7" ry="4.5" fill="#6BCB77"/><ellipse cx="78" cy="60" rx="7" ry="4.5" fill="#6BCB77" transform="rotate(-15 78 60)"/><rect x="37" y="86" width="9" height="7" rx="3" fill="#FF8C00"/><rect x="54" y="86" width="9" height="7" rx="3" fill="#FF8C00"/><circle cx="50" cy="34" r="4.5" fill="#FFD93D"/></svg></div>
  </div>
  <div id="side-panel">
    <div class="plate-option" data-plate="bar"><div class="plate-preview"><svg width="94" height="24" viewBox="0 0 94 24"><rect x="2" y="13" width="90" height="3" rx="1" fill="#d4845a"/><rect x="2" y="8" width="90" height="6" rx="1" fill="#e84393" opacity="0.92"/></svg></div><div class="plate-label">길게 자른 구리판</div></div>
    <div class="plate-option" data-plate="square"><div class="plate-preview"><svg width="56" height="58" viewBox="0 0 56 58"><rect x="2" y="4" width="52" height="48" rx="2" fill="#e84393" opacity="0.92"/><rect x="2" y="48" width="52" height="3" rx="1" fill="#d4845a"/></svg></div><div class="plate-label">정사각형 구리판</div></div>
    <div class="plate-option" data-plate="c-shape"><div class="plate-preview"><svg width="58" height="56" viewBox="0 0 58 56"><path d="M4,2 L54,2 L54,16 L18,16 L18,36 L54,36 L54,52 L4,52 Z" fill="#e84393" opacity="0.88"/><path d="M4,52 L54,52 L54,55 L4,55 Z" fill="#d4845a"/></svg></div><div class="plate-label">ㄷ 모양 구리판</div></div>
  </div>
  <div id="candle-panel"><div class="candle-option" id="candle-drag"><div class="candle-icon-area" id="candle-icon-inner"><svg viewBox="0 0 90 95" width="90" height="95"><line x1="30" y1="52" x2="10" y2="90" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/><line x1="60" y1="52" x2="80" y2="90" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/><line x1="38" y1="52" x2="22" y2="92" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/><line x1="52" y1="52" x2="68" y2="92" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/><rect x="22" y="44" width="46" height="8" rx="2" fill="#c8c8c8" opacity="0.5"/><ellipse cx="45" cy="43" rx="10" ry="3" fill="#eee" stroke="#ddd"/><rect x="38" y="28" width="14" height="16" rx="3" fill="#f0ece4" stroke="#ddd" stroke-width="0.5"/><line x1="45" y1="28" x2="45" y2="22" stroke="#555" stroke-width="1.2"/><ellipse cx="45" cy="16" rx="5" ry="9" fill="#fdcb6e" opacity="0.85"/><ellipse cx="45" cy="17" rx="3" ry="6" fill="#f39c12"/><ellipse cx="45" cy="18" rx="1.5" ry="3.5" fill="#fff8e7"/></svg></div><div class="candle-label">초</div></div></div>
  <div id="drop-zone-indicator"></div>
  <div id="speed-bar"><span class="speed-label">속도</span><button class="speed-btn" onclick="setHeatSpeed(0.5)">x0.5</button><button class="speed-btn active" onclick="setHeatSpeed(1)">x1</button><button class="speed-btn" onclick="setHeatSpeed(1.5)">x1.5</button><button class="speed-btn" onclick="setHeatSpeed(2)">x2</button></div>
  <button id="next-btn" onclick="goToSummary()">실험 정리하기 →</button>
  <div id="reset-btn" onclick="resetExperiment()">↺</div>
</div>
<div id="summary-overlay"><div id="summary-card"><div class="icon">🔥</div><h2>실험 결과 정리</h2><p>세 가지 모양의 구리판에서 열의 이동을 관찰했어요!</p><div class="highlight">고체에서는 온도가 높은 곳에서 온도가 낮은 곳으로<br>물체를 따라 열이 이동합니다.</div><button onclick="resetExperiment()">처음부터 다시하기</button></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
function M(geo,mat,x,y,z){var m=new THREE.Mesh(geo,mat);m.position.set(x||0,y||0,z||0);m.castShadow=true;return m;}

// TTS
var ttsVoice=null;
function initTTS(){
  if(!window.speechSynthesis)return;
  function loadVoice(){
    var voices=window.speechSynthesis.getVoices();
    for(var i=0;i<voices.length;i++){if(voices[i].lang.indexOf('ko')>=0){ttsVoice=voices[i];break;}}
  }
  loadVoice();
  window.speechSynthesis.onvoiceschanged=function(){loadVoice();};
}
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text.replace(/[🔥🔊]/g,''));
    u.lang='ko-KR';u.rate=0.93;u.pitch=1.05;
    if(ttsVoice)u.voice=ttsVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

var currentStep=0,currentPlate=null,isHeating=false,heatSourceWorld=null,heatTimer=null;
var heatStartTime=null,heatGridDist=null,heatSpeed=1;
var scene,camera,renderer,raycaster,groundPlane;
var standGroup,plateGroup,stickerGroup,candleGroup;
var stickerMaterials=[];
var flameMesh,flameLight,innerFlameMesh;
var isDragging=false,prevMouse={x:0,y:0};
var targetRot={x:0.3,y:-0.4},curRot={x:0.3,y:-0.4};
var targetZoom=5.5,curZoom=5.5;
var isDraggingCandle=false,dropZoneEl,candlePlaced=false,candleDropZoneMeshes=[];

// Conduction grid
var heatGrid=null,GS=80;
var plateWorldX=0,plateWorldZ=0,plateBoundsW=0,plateBoundsH=0;

var STAND_POS=new THREE.Vector3(-1.5,0,0);
// Clamp tip position in stand-local coords
var CLAMP_TIP_X=0.95;
var CLAMP_Y=1.35;

function getClampWorldPos(){return new THREE.Vector3(STAND_POS.x+CLAMP_TIP_X,CLAMP_Y,0);}
function getClampScreenPos(){var wp=getClampWorldPos(),sp=wp.clone().project(camera);return{x:(sp.x*0.5+0.5)*window.innerWidth,y:(-sp.y*0.5+0.5)*window.innerHeight};}

function createChromeTex(){
  var c=document.createElement('canvas');c.width=64;c.height=256;
  var ctx=c.getContext('2d');
  var g=ctx.createLinearGradient(0,0,64,0);
  g.addColorStop(0,'#444');g.addColorStop(0.08,'#888');g.addColorStop(0.2,'#bbb');
  g.addColorStop(0.35,'#dedede');g.addColorStop(0.5,'#ffffff');
  g.addColorStop(0.65,'#dedede');g.addColorStop(0.8,'#bbb');g.addColorStop(0.92,'#888');g.addColorStop(1,'#444');
  ctx.fillStyle=g;ctx.fillRect(0,0,64,256);
  var g2=ctx.createLinearGradient(0,0,0,256);
  g2.addColorStop(0,'rgba(255,255,255,0)');g2.addColorStop(0.25,'rgba(255,255,255,0.12)');
  g2.addColorStop(0.5,'rgba(255,255,255,0.25)');g2.addColorStop(0.75,'rgba(255,255,255,0.12)');g2.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g2;ctx.fillRect(0,0,64,256);
  var t=new THREE.CanvasTexture(c);t.wrapS=THREE.RepeatWrapping;t.wrapT=THREE.RepeatWrapping;return t;
}

function init(){
  raycaster=new THREE.Raycaster();
  scene=new THREE.Scene();
  var bgC=document.createElement('canvas');bgC.width=512;bgC.height=512;
  var bgx=bgC.getContext('2d');var gr=bgx.createLinearGradient(0,0,0,512);
  gr.addColorStop(0,'#e8f0f2');gr.addColorStop(0.45,'#d5e2e8');gr.addColorStop(1,'#c0d0d8');
  bgx.fillStyle=gr;bgx.fillRect(0,0,512,512);scene.background=new THREE.CanvasTexture(bgC);

  camera=new THREE.PerspectiveCamera(42,window.innerWidth/window.innerHeight,0.1,100);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  var dl=new THREE.DirectionalLight(0xffffff,0.85);dl.position.set(4,8,5);dl.castShadow=true;
  dl.shadow.mapSize.set(2048,2048);dl.shadow.camera.near=0.5;dl.shadow.camera.far=25;
  dl.shadow.camera.left=-6;dl.shadow.camera.right=6;dl.shadow.camera.top=6;dl.shadow.camera.bottom=-6;
  scene.add(dl);
  var fl2=new THREE.DirectionalLight(0x99bbdd,0.3);fl2.position.set(-3,3,-2);scene.add(fl2);
  var fl3=new THREE.DirectionalLight(0xffffff,0.45);fl3.position.set(0,5,-4);scene.add(fl3);
  var fl4=new THREE.DirectionalLight(0xeef4ff,0.35);fl4.position.set(2,2,6);scene.add(fl4);
  var pl=new THREE.PointLight(0xffffff,0.6,10);pl.position.set(0,4,2);scene.add(pl);

  var floor=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshStandardMaterial({color:0xb8ccd6,roughness:0.7,metalness:0.05}));
  floor.rotation.x=-Math.PI/2;floor.position.y=-0.01;floor.receiveShadow=true;scene.add(floor);

  groundPlane=new THREE.Mesh(new THREE.PlaneGeometry(40,40),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
  groundPlane.rotation.x=-Math.PI/2;groundPlane.position.y=0.02;scene.add(groundPlane);

  dropZoneEl=document.getElementById('drop-zone-indicator');
  buildStand();setupEvents();updateDropZone();initTTS();
  setTimeout(function(){document.getElementById('loading').style.opacity='0';setTimeout(function(){document.getElementById('loading').style.display='none';var ut=new SpeechSynthesisUtterance('고체에서 열의 이동 관찰하기');ut.lang='ko-KR';ut.rate=0.93;ut.pitch=1.05;if(ttsVoice)ut.voice=ttsVoice;ut.onend=function(){speak('구리판 한 개를 골라 고정 집게 쪽으로 옮겨 보세요.');};window.speechSynthesis&&window.speechSynthesis.speak(ut);},500);},500);
  animate();
}

function buildStand(){
  standGroup=new THREE.Group();
  var ct=createChromeTex();
  var chrome=new THREE.MeshPhongMaterial({map:ct,color:0xaaaaaa,specular:0xffffff,shininess:300,reflectivity:1.0});
  var dark=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.4,metalness:0.35});
  var blue=new THREE.MeshStandardMaterial({color:0x2065c9,roughness:0.35,metalness:0.2});
  var nut=new THREE.MeshStandardMaterial({color:0x888,roughness:0.25,metalness:0.85});

  standGroup.add(M(new THREE.BoxGeometry(2.0,0.13,1.4),dark,0,0.1,0));
  var fx=[-0.8,0.8],fz=[-0.55,0.55];
  for(var i=0;i<2;i++)for(var j=0;j<2;j++)standGroup.add(M(new THREE.BoxGeometry(0.15,0.06,0.15),dark,fx[i],0.02,fz[j]));

  // Vertical pole
  standGroup.add(M(new THREE.CylinderGeometry(0.05,0.05,3.2,24),chrome,-0.2,1.77,0));
  // Horizontal bar - extended to visually connect through blue jaw area, stops near clamp tip
  var hb=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.035,1.5,16),chrome);
  hb.position.set(0.27,CLAMP_Y,0);hb.rotation.z=Math.PI/2;hb.castShadow=true;standGroup.add(hb);

  // Collar clamp - at pole-bar junction (wraps around vertical pole at x=-0.2)
  standGroup.add(M(new THREE.BoxGeometry(0.20,0.22,0.26),dark,-0.2,CLAMP_Y,0));
  // Tightening knobs on the collar
  var kb=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.08,12),dark);kb.position.set(-0.2,CLAMP_Y+0.07,0.15);kb.rotation.x=Math.PI/2;standGroup.add(kb);
  var kb2=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.08,12),dark);kb2.position.set(-0.2,CLAMP_Y-0.07,0.15);kb2.rotation.x=Math.PI/2;standGroup.add(kb2);

  // Pivot
  var px=0.72;
  var pb=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.26,8),chrome);pb.position.set(px,CLAMP_Y,0);pb.rotation.x=Math.PI/2;standGroup.add(pb);
  var n1=new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.032,0.025,6),nut);n1.position.set(px,CLAMP_Y,0.14);n1.rotation.x=Math.PI/2;standGroup.add(n1);
  var n2=new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.032,0.025,6),nut);n2.position.set(px,CLAMP_Y,-0.14);n2.rotation.x=Math.PI/2;standGroup.add(n2);

  // Blue jaws - positioned right at end of horizontal bar
  var ju=M(new THREE.BoxGeometry(0.28,0.045,0.18),blue,CLAMP_TIP_X-0.1,CLAMP_Y+0.05,0);ju.rotation.z=0.05;standGroup.add(ju);
  var jd=M(new THREE.BoxGeometry(0.28,0.045,0.18),blue,CLAMP_TIP_X-0.1,CLAMP_Y-0.05,0);jd.rotation.z=-0.05;standGroup.add(jd);
  var tg=new THREE.SphereGeometry(0.035,8,8);
  var tu=M(tg,blue,CLAMP_TIP_X+0.04,CLAMP_Y+0.06,0);tu.scale.set(1,0.6,1.4);standGroup.add(tu);

// ===== PLATES - positioned touching the clamp tip =====
function createPlate(type){
  if(plateGroup)scene.remove(plateGroup);

  var cu=new THREE.MeshStandardMaterial({color:0xd4845a,roughness:0.3,metalness:0.7});
  var t=0.018;
  var cw=getClampWorldPos();

  // Plate center X: clamp tip + half plate width for bar, or small offset for square/c
  var pcx,pcz=0;
  if(type==='bar'){
    pcx=cw.x+1.5; // bar center: tip + half of 3.0
    plateGroup.add(M(new THREE.BoxGeometry(3,t,0.45),cu));
    createSticker(3,0.45,0,0);

    createSticker(1.7,1.7,0,0);
    plateBoundsW=1.7;plateBoundsH=1.7;
  }else{
    pcx=cw.x+0.85; // left arm flush with clamp jaw

    plateGroup.add(M(new THREE.BoxGeometry(1.7,t,armT),cu,0,0,-0.69));
    plateGroup.add(M(new THREE.BoxGeometry(1.7,t,armT),cu,0,0,0.69));
    plateGroup.add(M(new THREE.BoxGeometry(armT,t,1.7),cu,-0.69,0,0));

    createSticker(1.7,armT,0,0.69);
    createSticker(armT,1.7,-0.69,0);
    plateBoundsW=1.7;plateBoundsH=1.7;
  }

  plateWorldX=pcx;plateWorldZ=pcz;
  plateGroup.position.set(pcx,cw.y,pcz);
  stickerGroup.position.set(pcx,cw.y+t/2+0.003,pcz);
  scene.add(plateGroup);scene.add(stickerGroup);

}

function createSticker(w,h,ox,oz){
  var sx=Math.max(8,Math.round(w*16)),sz=Math.max(8,Math.round(h*16));
  var geo=new THREE.PlaneGeometry(w*0.97,h*0.97,sx,sz);
  var cnt=geo.attributes.position.count;
  var cols=new Float32Array(cnt*3);
  var cold0=heatToColor(0);
  for(var i=0;i<cnt;i++){cols[i*3]=cold0[0];cols[i*3+1]=cold0[1];cols[i*3+2]=cold0[2];}
  geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  var mat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.55,metalness:0.03,side:THREE.DoubleSide});
  var mesh=new THREE.Mesh(geo,mat);mesh.rotation.x=-Math.PI/2;mesh.position.set(ox,0,oz);
  stickerGroup.add(mesh);
  stickerMaterials.push({geo:geo,ox:ox,oz:oz,pw:plateBoundsW,ph:plateBoundsH});
}

// ===== CONDUCTION =====
function initHeatGrid(type){
  heatGrid=[];
  for(var i=0;i<GS;i++){heatGrid[i]=[];for(var j=0;j<GS;j++)heatGrid[i][j]={cu:false};}
  var hw=plateBoundsW/2,hh=plateBoundsH/2;
  for(var i=0;i<GS;i++)for(var j=0;j<GS;j++){
    var lx=(i/(GS-1)-0.5)*plateBoundsW; // -hw to hw
    var lz=(j/(GS-1)-0.5)*plateBoundsH;
    if(type==='bar'||type==='square'){
      heatGrid[i][j].cu=true;
    }else{
      var arm=0.16; // half of 0.32
      var eps=0.012;
      var inTop=(lz<=-hh+0.32+eps && lz>=-hh-eps);
      var inBot=(lz>=hh-0.32-eps && lz<=hh+eps);
      var inLeft=(lx>=-hw-eps && lx<=-hw+0.32+eps);
      heatGrid[i][j].cu=(inTop||inBot||inLeft);
    }
  }
}

// Euclidean distance: heat spreads in circles from candle position
function precomputeGridDist(wx,wz){
  if(!heatGrid)return;
  var lx=wx-plateWorldX,lz=wz-plateWorldZ;
  var gi0=Math.round((lx/plateBoundsW+0.5)*(GS-1));
  var gj0=Math.round((lz/plateBoundsH+0.5)*(GS-1));
  gi0=Math.max(0,Math.min(GS-1,gi0));gj0=Math.max(0,Math.min(GS-1,gj0));
  heatGridDist=[];var maxD=0;
  for(var i=0;i<GS;i++){heatGridDist[i]=[];for(var j=0;j<GS;j++){
    if(heatGrid[i][j].cu){
      var d=Math.sqrt((i-gi0)*(i-gi0)+(j-gj0)*(j-gj0));
      heatGridDist[i][j]=d;if(d>maxD)maxD=d;
    }else{heatGridDist[i][j]=-1;}
  }}
  if(maxD>0)for(var i=0;i<GS;i++)for(var j=0;j<GS;j++)if(heatGridDist[i][j]>=0)heatGridDist[i][j]/=maxD;
}

// Thermochromic: pink(cold) → light pink → white(hot), no yellow
// Sigmoid S-curve for sharp wave-like transition
function heatToColor(heat){
  heat=Math.min(1,Math.max(0,heat));
  var sig=1/(1+Math.exp(-10*(heat-0.5)));
  return [0.91+sig*0.09, 0.27+sig*0.73, 0.47+sig*0.53];
}
function updateColors(){
  if(!isHeating||!heatStartTime||!heatGridDist||!stickerMaterials.length)return;
  var elapsed=Math.min(1.0,(Date.now()-heatStartTime)/10000*heatSpeed);
  for(var si=0;si<stickerMaterials.length;si++){
    var sm=stickerMaterials[si];
    var pos=sm.geo.attributes.position,col=sm.geo.attributes.color,cnt=pos.count;
    for(var vi=0;vi<cnt;vi++){
      var vlx=pos.getX(vi)+sm.ox;
      var vlz=-pos.getY(vi)+sm.oz;
      var gi=Math.round((vlx/plateBoundsW+0.5)*(GS-1));
      var gj=Math.round((vlz/plateBoundsH+0.5)*(GS-1));
      var heat=0;
      if(gi>=0&&gi<GS&&gj>=0&&gj<GS){
        var dist=heatGridDist[gi][gj];
        if(dist<0){var nbs=[[gi-1,gj],[gi+1,gj],[gi,gj-1],[gi,gj+1]];for(var nb=0;nb<4;nb++){var ni=nbs[nb][0],nj=nbs[nb][1];if(ni>=0&&ni<GS&&nj>=0&&nj<GS&&heatGridDist[ni][nj]>=0){dist=heatGridDist[ni][nj];break;}}}
        if(dist>=0)heat=Math.max(0,Math.min(1,(elapsed-dist*0.82)/0.18));
      }
      var c=heatToColor(heat);
      col.setXYZ(vi,c[0],c[1],c[2]);
    }
    col.needsUpdate=true;
  }
}

function animate(){
  requestAnimationFrame(animate);
  curRot.x+=(targetRot.x-curRot.x)*0.05;curRot.y+=(targetRot.y-curRot.y)*0.05;curZoom+=(targetZoom-curZoom)*0.05;
  camera.position.x=Math.sin(curRot.y)*Math.cos(curRot.x)*curZoom;
  camera.position.y=Math.sin(curRot.x)*curZoom+1.0;
  camera.position.z=Math.cos(curRot.y)*Math.cos(curRot.x)*curZoom;
  camera.lookAt(0,1.0,0);
  if(flameMesh){var tt=Date.now();flameMesh.scale.x=1+Math.sin(tt*0.013)*0.1;flameMesh.scale.y=1+Math.sin(tt*0.016)*0.15;if(innerFlameMesh){innerFlameMesh.scale.x=1+Math.sin(tt*0.017)*0.08;innerFlameMesh.scale.y=1+Math.cos(tt*0.011)*0.12;}if(flameLight)flameLight.intensity=1.6+Math.sin(tt*0.01)*0.3;}

  updateDropZone();renderer.render(scene,camera);
}

    raycaster.setFromCamera(new THREE.Vector2(nx,ny),camera);
    var h=raycaster.intersectObject(groundPlane);
    if(h.length>0)return{x:h[0].point.x,z:h[0].point.z};
    var o=raycaster.ray.origin,d=raycaster.ray.direction;
    if(Math.abs(d.y)>0.0001){var t2=(0.02-o.y)/d.y;if(t2>0)return{x:o.x+d.x*t2,z:o.z+d.z*t2};}
    return null;
  }
  function underPlate(wx,wz){
    var lx=wx-plateWorldX,lz=wz-plateWorldZ;

    var moved=false,sx2=t0.clientX,sy2=t0.clientY;
    function onM(ev){ev.preventDefault();var tc=ev.touches[0];cg2(g,tc.clientX,tc.clientY,ox,oy);if(Math.hypot(tc.clientX-sx2,tc.clientY-sy2)>5)moved=true;}
    function onE(ev){el.removeEventListener('touchmove',onM);el.removeEventListener('touchend',onE);isDraggingCandle=false;g.remove();var ct=ev.changedTouches[0];if(moved){var p=s2w(ct.clientX,ct.clientY);if(p&&underPlate(p.x,p.z))doPlaceCandle(p.x,p.z);}}
    el.addEventListener('touchmove',onM,{passive:false});el.addEventListener('touchend',onE);
  },{passive:false});

function showCandleDropZone(){

  var lineMat=new THREE.LineBasicMaterial({color:0x00cc88,linewidth:2});
  function addRect(w,h,ox,oz){
    var geo=new THREE.PlaneGeometry(w*0.97,h*0.97);

    mesh.rotation.x=-Math.PI/2;

    scene.add(mesh);candleDropZoneMeshes.push(mesh);
    var eg=new THREE.EdgesGeometry(new THREE.PlaneGeometry(w*0.97,h*0.97));
    var border=new THREE.LineSegments(eg,lineMat);
    border.rotation.x=-Math.PI/2;
    border.position.set(plateWorldX+ox,yf+0.003,plateWorldZ+oz);
    scene.add(border);candleDropZoneMeshes.push(border);
  }
  if(currentPlate==='bar'){

    addRect(1.7,armT,0,-0.69);
    addRect(1.7,armT,0,0.69);
    addRect(armT,1.7,-0.69,0);
  }
}
function hideCandleDropZone(){
  for(var i=0;i<candleDropZoneMeshes.length;i++)scene.remove(candleDropZoneMeshes[i]);
  candleDropZoneMeshes=[];
}
function resetCandle(){
  if(heatTimer){clearTimeout(heatTimer);heatTimer=null;}
  if(candleGroup){scene.remove(candleGroup);candleGroup=null;}
  flameMesh=null;flameLight=null;innerFlameMesh=null;
  isHeating=false;heatSourceWorld=null;heatStartTime=null;heatGridDist=null;candlePlaced=false;
  resetColors();initHeatGrid(currentPlate);showCandleFull();
  showCandleDropZone();
  currentStep=1;updateDots();document.getElementById('next-btn').style.display='none';
  var msg='초를 구리판 아래 초록색 표시 부분으로 옮겨 보세요.';updateGuide(msg);
}

function showCandleEmpty(){
  var p=document.getElementById('candle-drag');p.classList.add('empty');
  document.getElementById('candle-icon-inner').style.display='none';
  if(!document.getElementById('empty-ph')){var ph=document.createElement('div');ph.id='empty-ph';ph.className='empty-placeholder';ph.textContent='↺';p.insertBefore(ph,p.querySelector('.candle-label'));}
  else document.getElementById('empty-ph').style.display='flex';
  p.querySelector('.candle-label').textContent='다시 놓기';
  document.getElementById('candle-panel').style.display='block';
}
function showCandleFull(){
  var p=document.getElementById('candle-drag');p.classList.remove('empty');
  document.getElementById('candle-icon-inner').style.display='block';
  if(document.getElementById('empty-ph'))document.getElementById('empty-ph').style.display='none';
  p.querySelector('.candle-label').textContent='초';
}

function setHeatSpeed(s){
  if(isHeating&&heatStartTime){var el=Math.min(1.0,(Date.now()-heatStartTime)/10000*heatSpeed);heatSpeed=s;heatStartTime=Date.now()-el*10000/heatSpeed;}else{heatSpeed=s;}
  document.querySelectorAll('.speed-btn').forEach(function(b){b.classList.toggle('active',parseFloat(b.textContent.replace('x',''))===s);});
}
function resetColors(){var cold=heatToColor(0);for(var si=0;si<stickerMaterials.length;si++){var sm=stickerMaterials[si],c=sm.geo.attributes.color,n=sm.geo.attributes.position.count;for(var i=0;i<n;i++)c.setXYZ(i,cold[0],cold[1],cold[2]);c.needsUpdate=true;}}
function goToSummary(){document.getElementById('next-btn').style.display='none';document.getElementById('summary-overlay').style.display='flex';isHeating=false;var msg='고체에서는 온도가 높은 곳에서 온도가 낮은 곳으로 물체를 따라 열이 이동합니다.';speak(msg);}
function updateGuide(txt){var b=document.getElementById('guide-bubble');b.style.opacity='0';setTimeout(function(){b.textContent=txt;b.style.opacity='1';speak(txt);},200);}
function updateDots(){for(var i=1;i<=3;i++){var d=document.getElementById('dot-'+i);d.className='step-dot';if(i<currentStep+1)d.classList.add('completed');if(i===currentStep+1)d.classList.add('active');}}

function resetExperiment(){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  if(plateGroup){scene.remove(plateGroup);plateGroup=null;}
  if(stickerGroup){scene.remove(stickerGroup);stickerGroup=null;}
  if(candleGroup){scene.remove(candleGroup);candleGroup=null;}
  stickerMaterials=[];flameMesh=null;flameLight=null;innerFlameMesh=null;heatGrid=null;
  if(heatTimer){clearTimeout(heatTimer);heatTimer=null;}
  heatStartTime=null;heatGridDist=null;
  hideCandleDropZone();
  currentStep=0;currentPlate=null;isHeating=false;heatSourceWorld=null;candlePlaced=false;
  document.getElementById('side-panel').style.display='flex';document.getElementById('candle-panel').style.display='none';
  document.getElementById('next-btn').style.display='none';document.getElementById('summary-overlay').style.display='none';
  document.getElementById('speed-bar').style.display='none';heatSpeed=1;setHeatSpeed(1);
  showCandleFull();updateDots();
  var msg='구리판 한 개를 골라 고정 집게 쪽으로 옮겨 보세요.';
  updateGuide(msg);targetRot={x:0.3,y:-0.4};targetZoom=5.5;
}

init();
</script>
</body>
</html>
