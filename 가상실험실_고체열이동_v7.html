<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가상 실험실 - 고체에서 열의 이동</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;overflow:hidden;background:#c8d6dc;width:100vw;height:100vh}
#canvas-container{width:100%;height:100%;position:relative}
canvas{display:block}

#header{position:absolute;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,#00b894,#00cec9);display:flex;align-items:center;padding:0 20px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
#header .mascot-icon{width:36px;height:36px;background:#55efc4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:10px}
#header .title-badge{background:rgba(255,255,255,0.25);border-radius:20px;padding:3px 14px;color:#fff;font-weight:700;font-size:14px;margin-right:14px}
#header .subtitle{color:#fff;font-size:13px;font-weight:500}

#step-indicator{position:absolute;top:64px;left:20px;display:flex;gap:6px;z-index:100}
.step-dot{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);transition:all .4s}
.step-dot.active{background:#00b894;color:#fff;box-shadow:0 3px 10px rgba(0,184,148,0.4)}
.step-dot.completed{background:#55efc4;color:#fff}

#guide-area{position:absolute;bottom:120px;left:14px;display:flex;flex-direction:column;align-items:flex-start;z-index:100;pointer-events:none}
#guide-bubble{background:#fff;border-radius:18px;padding:12px 20px;font-size:13.5px;font-weight:500;color:#2d3436;box-shadow:0 5px 20px rgba(0,0,0,0.18);max-width:380px;line-height:1.6;transition:opacity .35s;opacity:1;position:relative;white-space:pre-line}
#guide-bubble::after{content:'';position:absolute;bottom:-10px;left:36px;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #fff}
#character-wrap{margin-left:12px;margin-top:2px}
#character-svg{width:60px;height:60px}

#side-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:100}
.plate-option{width:118px;background:rgba(255,255,255,0.96);border-radius:14px;padding:10px;text-align:center;cursor:grab;transition:all .25s;box-shadow:0 3px 14px rgba(0,0,0,0.14);user-select:none}
.plate-option:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,0.22)}
.plate-preview{width:94px;height:60px;margin:0 auto 5px;display:flex;align-items:center;justify-content:center}
.plate-label{font-size:11px;font-weight:700;color:#2d3436}

#candle-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:100;display:none}
.candle-option{width:126px;background:rgba(255,255,255,0.96);border-radius:14px;padding:14px 10px;text-align:center;cursor:grab;box-shadow:0 3px 14px rgba(0,0,0,0.14);transition:all .25s;user-select:none}
.candle-option:hover{transform:scale(1.05)}
.candle-option.empty{cursor:pointer;background:rgba(255,255,255,0.96);border:3px dashed #bbb;box-shadow:none}
.candle-option.empty:hover{border-color:#00b894;transform:scale(1.02)}
.candle-icon-area{width:90px;height:95px;margin:0 auto 6px}
.candle-label{font-size:12px;font-weight:700;color:#2d3436}
.empty-placeholder{width:90px;height:95px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:28px}

#next-btn{position:absolute;bottom:20px;right:20px;padding:12px 28px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;z-index:100;box-shadow:0 4px 18px rgba(0,184,148,0.4);transition:all .25s;display:none}
#next-btn:hover{transform:translateY(-2px)}

#reset-btn{position:absolute;bottom:20px;left:18px;width:44px;height:44px;background:#222;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:100;transition:all .3s;color:#fff;font-size:20px;box-shadow:0 3px 12px rgba(0,0,0,0.4)}
#reset-btn:hover{background:#000;transform:rotate(-180deg)}

#drop-zone-indicator{position:absolute;pointer-events:none;z-index:50;display:block;border:3px dashed rgba(150,150,150,0.55);border-radius:16px;transition:border-color .3s}
#drop-zone-indicator.highlight{border-color:#00b894;box-shadow:0 0 18px rgba(0,184,148,0.35)}

#summary-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200}
#summary-card{background:#fff;border-radius:22px;padding:42px;max-width:520px;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,0.3);animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#summary-card h2{font-size:22px;color:#00b894;margin-bottom:6px}
#summary-card .icon{font-size:44px;margin-bottom:12px}
#summary-card p{font-size:16px;color:#2d3436;line-height:1.8;margin-bottom:20px}
#summary-card .highlight{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;padding:14px 20px;border-radius:14px;font-size:15px;font-weight:700;line-height:1.6}
#summary-card button{margin-top:20px;padding:11px 28px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

#loading{position:absolute;top:0;left:0;right:0;bottom:0;background:#c8d6dc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;transition:opacity .5s}
.spinner{width:44px;height:44px;border:4px solid rgba(0,184,148,0.2);border-top-color:#00b894;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}
#loading p{color:#555;margin-top:14px;font-weight:500}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>가상 실험실을 준비하고 있어요...</p></div>

<div id="canvas-container">
  <div id="header">
    <div class="mascot-icon">🔬</div>
    <div class="title-badge">가상 실험실</div>
    <div class="subtitle">고체에서 열의 이동으로 나타나는 현상 관찰하기</div>
  </div>
  <div id="step-indicator">
    <div class="step-dot active" id="dot-1">1</div>
    <div class="step-dot" id="dot-2">2</div>
    <div class="step-dot" id="dot-3">3</div>
  </div>
  <div id="guide-area">
    <div id="guide-bubble">열 변색 붙임딱지가 붙어 있는 구리판 중 하나를 골라 고정 집게 쪽으로 드래그해 주세요.</div>
    <div id="character-wrap">
      <svg id="character-svg" viewBox="0 0 100 110">
        <ellipse cx="50" cy="62" rx="30" ry="26" fill="#6BCB77"/>
        <ellipse cx="37" cy="52" rx="9" ry="10" fill="#fff"/><ellipse cx="63" cy="52" rx="9" ry="10" fill="#fff"/>
        <circle cx="39" cy="53" r="5" fill="#2d3436"/><circle cx="65" cy="53" r="5" fill="#2d3436"/>
        <circle cx="41" cy="51" r="2" fill="#fff"/><circle cx="67" cy="51" r="2" fill="#fff"/>
        <path d="M43,68 Q50,76 57,68" stroke="#2d3436" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="22" cy="65" rx="7" ry="4.5" fill="#6BCB77"/>
        <ellipse cx="78" cy="60" rx="7" ry="4.5" fill="#6BCB77" transform="rotate(-15 78 60)"/>
        <rect x="37" y="86" width="9" height="7" rx="3" fill="#FF8C00"/><rect x="54" y="86" width="9" height="7" rx="3" fill="#FF8C00"/>
        <circle cx="50" cy="34" r="4.5" fill="#FFD93D"/>
      </svg>
    </div>
  </div>

  <div id="side-panel">
    <div class="plate-option" data-plate="bar"><div class="plate-preview"><svg width="94" height="24" viewBox="0 0 94 24"><rect x="2" y="13" width="90" height="3" rx="1" fill="#d4845a"/><rect x="2" y="8" width="90" height="6" rx="1" fill="#e84393" opacity="0.92"/></svg></div><div class="plate-label">길게 자른 구리판</div></div>
    <div class="plate-option" data-plate="square"><div class="plate-preview"><svg width="56" height="58" viewBox="0 0 56 58"><rect x="2" y="4" width="52" height="48" rx="2" fill="#e84393" opacity="0.92"/><rect x="2" y="48" width="52" height="3" rx="1" fill="#d4845a"/></svg></div><div class="plate-label">정사각형 구리판</div></div>
    <div class="plate-option" data-plate="c-shape"><div class="plate-preview"><svg width="58" height="56" viewBox="0 0 58 56"><path d="M4,2 L54,2 L54,16 L18,16 L18,36 L54,36 L54,52 L4,52 Z" fill="#e84393" opacity="0.88"/><path d="M4,52 L54,52 L54,55 L4,55 Z" fill="#d4845a"/></svg></div><div class="plate-label">ㄷ 모양 구리판</div></div>
  </div>

  <div id="candle-panel">
    <div class="candle-option" id="candle-drag">
      <div class="candle-icon-area" id="candle-icon-inner">
        <svg viewBox="0 0 90 95" width="90" height="95">
          <line x1="30" y1="52" x2="10" y2="90" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/>
          <line x1="60" y1="52" x2="80" y2="90" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/>
          <line x1="38" y1="52" x2="22" y2="92" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/>
          <line x1="52" y1="52" x2="68" y2="92" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round"/>
          <rect x="22" y="44" width="46" height="8" rx="2" fill="#c8c8c8" opacity="0.5"/>
          <ellipse cx="45" cy="43" rx="10" ry="3" fill="#eee" stroke="#ddd"/>
          <rect x="38" y="28" width="14" height="16" rx="3" fill="#f0ece4" stroke="#ddd" stroke-width="0.5"/>
          <line x1="45" y1="28" x2="45" y2="22" stroke="#555" stroke-width="1.2"/>
          <ellipse cx="45" cy="16" rx="5" ry="9" fill="#fdcb6e" opacity="0.85"/>
          <ellipse cx="45" cy="17" rx="3" ry="6" fill="#f39c12"/>
          <ellipse cx="45" cy="18" rx="1.5" ry="3.5" fill="#fff8e7"/>
        </svg>
      </div>
      <div class="candle-label">초</div>
    </div>
  </div>

  <div id="drop-zone-indicator"></div>
  <button id="next-btn" onclick="goToSummary()">실험 정리하기 →</button>
  <div id="reset-btn" onclick="resetExperiment()">↺</div>
</div>

<div id="summary-overlay">
  <div id="summary-card">
    <div class="icon">🔥</div><h2>실험 결과 정리</h2>
    <p>세 가지 모양의 구리판에서 열의 이동을 관찰했어요!</p>
    <div class="highlight">고체에서는 온도가 높은 곳에서 온도가 낮은 곳으로<br>물체를 따라 열이 이동합니다.</div>
    <button onclick="resetExperiment()">처음부터 다시하기</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
function M(geo,mat,x,y,z){var m=new THREE.Mesh(geo,mat);m.position.set(x||0,y||0,z||0);m.castShadow=true;return m;}

var currentStep=0,currentPlate=null,isHeating=false,heatTime=0,heatSourceWorld=null;
var scene,camera,renderer;
var standGroup,plateGroup,stickerGroup,candleGroup;
var stickerMaterials=[];
var flameMesh,flameLight,innerFlameMesh;
var isDragging=false,prevMouse={x:0,y:0};
var targetRot={x:0.25,y:-0.4},curRot={x:0.25,y:-0.4};
var targetZoom=5.2,curZoom=5.2;
var raycaster,groundPlane;
var isDraggingCandle=false;
var dropZoneEl;
var candlePlaced=false;

// Heat grid for conduction simulation
var heatMap=null; // 2D array for plate heat values
var GRID_RES=60;

var STAND_OFFSET=new THREE.Vector3(-1.2,0,0);
var CLAMP_TIP_LOCAL=new THREE.Vector3(0.95,1.35,0);
function getClampWorldPos(){return CLAMP_TIP_LOCAL.clone().add(STAND_OFFSET);}
function getClampScreenPos(){var wp=getClampWorldPos(),sp=wp.clone().project(camera);return{x:(sp.x*0.5+0.5)*window.innerWidth,y:(-sp.y*0.5+0.5)*window.innerHeight};}

// Create gradient texture for chrome poles
function createChromeTexture(){
  var c=document.createElement('canvas');c.width=64;c.height=256;
  var ctx=c.getContext('2d');
  var g=ctx.createLinearGradient(0,0,64,0);
  g.addColorStop(0,'#888888');
  g.addColorStop(0.2,'#cccccc');
  g.addColorStop(0.4,'#eeeeee');
  g.addColorStop(0.5,'#ffffff');
  g.addColorStop(0.6,'#eeeeee');
  g.addColorStop(0.8,'#bbbbbb');
  g.addColorStop(1,'#888888');
  ctx.fillStyle=g;ctx.fillRect(0,0,64,256);
  var tex=new THREE.CanvasTexture(c);
  tex.wrapS=THREE.RepeatWrapping;tex.wrapT=THREE.RepeatWrapping;
  return tex;
}

function init(){
  raycaster=new THREE.Raycaster();
  scene=new THREE.Scene();
  var bgC=document.createElement('canvas');bgC.width=512;bgC.height=512;
  var bgx=bgC.getContext('2d');
  var gr=bgx.createLinearGradient(0,0,0,512);
  gr.addColorStop(0,'#e8f0f2');gr.addColorStop(0.45,'#d5e2e8');gr.addColorStop(1,'#c0d0d8');
  bgx.fillStyle=gr;bgx.fillRect(0,0,512,512);
  scene.background=new THREE.CanvasTexture(bgC);

  camera=new THREE.PerspectiveCamera(42,window.innerWidth/window.innerHeight,0.1,100);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  var dl=new THREE.DirectionalLight(0xffffff,0.75);
  dl.position.set(4,8,5);dl.castShadow=true;
  dl.shadow.mapSize.set(2048,2048);dl.shadow.camera.near=0.5;dl.shadow.camera.far=25;
  dl.shadow.camera.left=-6;dl.shadow.camera.right=6;dl.shadow.camera.top=6;dl.shadow.camera.bottom=-6;
  scene.add(dl);
  scene.add(M(new THREE.BoxGeometry(0,0,0),new THREE.MeshBasicMaterial(),0,0,0));// dummy
  var fl2=new THREE.DirectionalLight(0x99bbdd,0.25);fl2.position.set(-3,3,-2);scene.add(fl2);

  var floorMat=new THREE.MeshStandardMaterial({color:0xb8ccd6,roughness:0.7,metalness:0.05});
  var floor=new THREE.Mesh(new THREE.PlaneGeometry(20,20),floorMat);
  floor.rotation.x=-Math.PI/2;floor.position.y=-0.01;floor.receiveShadow=true;scene.add(floor);

  groundPlane=new THREE.Mesh(new THREE.PlaneGeometry(40,40),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
  groundPlane.rotation.x=-Math.PI/2;groundPlane.position.y=0.02;scene.add(groundPlane);

  dropZoneEl=document.getElementById('drop-zone-indicator');
  buildStand();setupEvents();updateDropZone();

  setTimeout(function(){document.getElementById('loading').style.opacity='0';setTimeout(function(){document.getElementById('loading').style.display='none';},500);},500);
  animate();
}

function buildStand(){
  standGroup=new THREE.Group();
  var chromeTex=createChromeTexture();
  var chrome=new THREE.MeshStandardMaterial({map:chromeTex,roughness:0.15,metalness:0.9});
  var dark=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.4,metalness:0.35});
  var blue=new THREE.MeshStandardMaterial({color:0x2065c9,roughness:0.35,metalness:0.2});
  var nutMat=new THREE.MeshStandardMaterial({color:0x888888,roughness:0.25,metalness:0.85});

  // Base
  standGroup.add(M(new THREE.BoxGeometry(2.0,0.13,1.4),dark,0,0.1,0));
  var fxs=[-0.8,0.8],fzs=[-0.55,0.55];
  for(var fi=0;fi<fxs.length;fi++)for(var fj=0;fj<fzs.length;fj++)
    standGroup.add(M(new THREE.BoxGeometry(0.15,0.06,0.15),dark,fxs[fi],0.02,fzs[fj]));

  // Vertical pole - silver gradient
  standGroup.add(M(new THREE.CylinderGeometry(0.05,0.05,3.2,24),chrome,-0.2,1.77,0));

  // Horizontal bar - silver gradient, medium length
  var hBar=new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.032,1.2,16),chrome);
  hBar.position.set(0.2,1.35,0);hBar.rotation.z=Math.PI/2;hBar.castShadow=true;
  standGroup.add(hBar);

  // Clamp block
  standGroup.add(M(new THREE.BoxGeometry(0.16,0.16,0.20),dark,-0.05,1.35,0));
  // Knobs
  var knob1=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.07,12),dark);
  knob1.position.set(-0.05,1.41,0.13);knob1.rotation.x=Math.PI/2;standGroup.add(knob1);
  var knob2=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.07,12),dark);
  knob2.position.set(-0.05,1.29,0.13);knob2.rotation.x=Math.PI/2;standGroup.add(knob2);

  // Arm connecting to blue clamp
  var arm=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.25,8),chrome);
  arm.position.set(0.5,1.35,0);arm.rotation.z=Math.PI/2;standGroup.add(arm);

  // Pivot
  var pivotX=0.68;
  var pb=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.26,8),chrome);
  pb.position.set(pivotX,1.35,0);pb.rotation.x=Math.PI/2;standGroup.add(pb);
  var n1=new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.032,0.025,6),nutMat);
  n1.position.set(pivotX,1.35,0.14);n1.rotation.x=Math.PI/2;standGroup.add(n1);
  var n2=new THREE.Mesh(new THREE.CylinderGeometry(0.032,0.032,0.025,6),nutMat);
  n2.position.set(pivotX,1.35,-0.14);n2.rotation.x=Math.PI/2;standGroup.add(n2);

  // Blue jaws
  var jawUp=M(new THREE.BoxGeometry(0.28,0.045,0.18),blue,0.86,1.40,0);jawUp.rotation.z=0.05;standGroup.add(jawUp);
  var jawDn=M(new THREE.BoxGeometry(0.28,0.045,0.18),blue,0.86,1.30,0);jawDn.rotation.z=-0.05;standGroup.add(jawDn);
  var tipGeo=new THREE.SphereGeometry(0.035,8,8);
  var tU=M(tipGeo,blue,0.99,1.41,0);tU.scale.set(1,0.6,1.4);standGroup.add(tU);
  var tD=M(tipGeo,blue,0.99,1.29,0);tD.scale.set(1,0.6,1.4);standGroup.add(tD);
  standGroup.add(M(new THREE.CylinderGeometry(0.014,0.014,0.08,6),chrome,0.86,1.24,0));
  standGroup.add(M(new THREE.SphereGeometry(0.024,6,6),nutMat,0.86,1.20,0));

  standGroup.position.copy(STAND_OFFSET);
  scene.add(standGroup);
}

// ===== PLATES =====
// Plate geometry info for conduction grid
var plateInfo=null; // {type, bounds for grid mapping}

function createPlateWithSticker(type){
  if(plateGroup)scene.remove(plateGroup);
  if(stickerGroup)scene.remove(stickerGroup);
  plateGroup=new THREE.Group();stickerGroup=new THREE.Group();stickerMaterials=[];
  var copper=new THREE.MeshStandardMaterial({color:0xd4845a,roughness:0.3,metalness:0.7});
  var t=0.018;
  var cw=getClampWorldPos();

  // Offset plate further right so bar plate doesn't overlap horizontal rod
  var plateOffX=cw.x+1.0;

  if(type==='bar'){
    plateGroup.add(M(new THREE.BoxGeometry(3,t,0.45),copper,0,0,0));
    createStickerQuad(3,0.45,0,0);
    plateInfo={type:'bar',cx:plateOffX,cz:0,w:3,h:0.45};
  }else if(type==='square'){
    plateGroup.add(M(new THREE.BoxGeometry(1.7,t,1.7),copper,0,0,0));
    createStickerQuad(1.7,1.7,0,0);
    plateInfo={type:'square',cx:plateOffX,cz:0,w:1.7,h:1.7};
  }else{
    plateGroup.add(M(new THREE.BoxGeometry(1.7,t,0.32),copper,0,0,-0.69));
    plateGroup.add(M(new THREE.BoxGeometry(1.7,t,0.32),copper,0,0,0.69));
    plateGroup.add(M(new THREE.BoxGeometry(0.32,t,1.7),copper,-0.69,0,0));
    createStickerQuad(1.7,0.32,0,-0.69);
    createStickerQuad(1.7,0.32,0,0.69);
    createStickerQuad(0.32,1.7,-0.69,0);
    plateInfo={type:'c-shape',cx:plateOffX,cz:0,w:1.7,h:1.7};
  }

  plateGroup.position.set(plateOffX,cw.y,0);
  stickerGroup.position.set(plateOffX,cw.y+t/2+0.003,0);

// ===== CONDUCTION GRID =====
// Grid cells: 1=copper, 0=empty. Heat diffuses only through copper cells.
var heatGrid=null;
var GS=80; // grid size

function initHeatGrid(){
  heatGrid=[];
  for(var i=0;i<GS;i++){heatGrid[i]=[];for(var j=0;j<GS;j++)heatGrid[i][j]={isCu:false,temp:0};}

  // Mark copper cells based on plate type
  var pi=plateInfo;
  if(!pi)return;
  for(var i=0;i<GS;i++)for(var j=0;j<GS;j++){
    // Map grid to local plate coords: -halfW..halfW, -halfH..halfH
    var lx=(i/(GS-1)-0.5)*pi.w;
    var lz=(j/(GS-1)-0.5)*pi.h;
    if(pi.type==='bar'){
      heatGrid[i][j].isCu=true; // entire rect is copper
    }else if(pi.type==='square'){
      heatGrid[i][j].isCu=true;
    }else{ // c-shape: top bar, bottom bar, left bar
      var hw=pi.w/2, hh=pi.h/2;
      var armW=0.32/2;
      var inTop=(lz>=-hh && lz<=-hh+0.32);
      var inBot=(lz<=hh && lz>=hh-0.32);
      var inLeft=(lx>=-hw && lx<=-hw+0.32);
      heatGrid[i][j].isCu=(inTop||inBot||inLeft);
    }
  }
}

function setHeatSource(worldX,worldZ){
  if(!heatGrid||!plateInfo)return;
  // Convert world pos to grid coords
  var pi=plateInfo;
  var lx=worldX-pi.cx;
  var lz=worldZ-pi.cz;
  var gi=Math.round((lx/pi.w+0.5)*(GS-1));
  var gj=Math.round((lz/pi.h+0.5)*(GS-1));
  // Set heat at source cells (small radius)
  for(var di=-2;di<=2;di++)for(var dj=-2;dj<=2;dj++){
    var ii=gi+di,jj=gj+dj;
    if(ii>=0&&ii<GS&&jj>=0&&jj<GS&&heatGrid[ii][jj].isCu){
      heatGrid[ii][jj].temp=1.0;
    }
  }
}

function stepConduction(){
  if(!heatGrid)return;
  // Diffuse heat only through copper cells
  var newTemp=[];
  for(var i=0;i<GS;i++){newTemp[i]=[];for(var j=0;j<GS;j++)newTemp[i][j]=heatGrid[i][j].temp;}
  var diff=0.08; // diffusion rate
  for(var i=0;i<GS;i++)for(var j=0;j<GS;j++){
    if(!heatGrid[i][j].isCu)continue;
    var sum=0,cnt=0;
    var nb=[[i-1,j],[i+1,j],[i,j-1],[i,j+1]];
    for(var n=0;n<4;n++){
      var ni=nb[n][0],nj=nb[n][1];
      if(ni>=0&&ni<GS&&nj>=0&&nj<GS&&heatGrid[ni][nj].isCu){
        sum+=heatGrid[ni][nj].temp;cnt++;
      }
    }
    if(cnt>0){
      newTemp[i][j]=heatGrid[i][j].temp+diff*(sum/cnt-heatGrid[i][j].temp);
    }
  }
  for(var i=0;i<GS;i++)for(var j=0;j<GS;j++)heatGrid[i][j].temp=newTemp[i][j];

  // Keep heat source hot
  if(heatSourceWorld){
    setHeatSource(heatSourceWorld.x,heatSourceWorld.z);
  }
}

function updateStickersFromGrid(){
  if(!heatGrid||!plateInfo||!stickerMaterials.length)return;
  var pi=plateInfo;
  for(var si=0;si<stickerMaterials.length;si++){
    var sm=stickerMaterials[si];
    var pos=sm.geo.attributes.position,col=sm.geo.attributes.color,cnt=pos.count;
    for(var vi=0;vi<cnt;vi++){
      var lx=pos.getX(vi)+sm.ox;
      var lz=-pos.getY(vi)+sm.oz;
      // Map to grid
      var gi=Math.round((lx/pi.w+0.5)*(GS-1));
      var gj=Math.round((lz/pi.h+0.5)*(GS-1));
      var heat=0;
      if(gi>=0&&gi<GS&&gj>=0&&gj<GS&&heatGrid[gi][gj].isCu){
        heat=heatGrid[gi][gj].temp;
      }
      col.setXYZ(vi,0.91+heat*0.09,0.27+heat*0.73,0.47+heat*0.53);
    }
    col.needsUpdate=true;
  }
}

// ===== ANIMATION =====
function animate(){
  requestAnimationFrame(animate);
  curRot.x+=(targetRot.x-curRot.x)*0.05;curRot.y+=(targetRot.y-curRot.y)*0.05;curZoom+=(targetZoom-curZoom)*0.05;
  camera.position.x=Math.sin(curRot.y)*Math.cos(curRot.x)*curZoom;
  camera.position.y=Math.sin(curRot.x)*curZoom+1.0;
  camera.position.z=Math.cos(curRot.y)*Math.cos(curRot.x)*curZoom;
  camera.lookAt(0,1.0,0);
  if(flameMesh){var t=Date.now();flameMesh.scale.x=1+Math.sin(t*0.013)*0.1;flameMesh.scale.y=1+Math.sin(t*0.016)*0.15;if(innerFlameMesh){innerFlameMesh.scale.x=1+Math.sin(t*0.017)*0.08;innerFlameMesh.scale.y=1+Math.cos(t*0.011)*0.12;}if(flameLight)flameLight.intensity=1.6+Math.sin(t*0.01)*0.3;}
  if(isHeating){
    // Run multiple conduction steps per frame for visible speed
    for(var s=0;s<3;s++) stepConduction();
    updateStickersFromGrid();
  }
  updateDropZone();
  renderer.render(scene,camera);
}

// ===== CANDLE DRAG - constrained to under plate area =====
function setupCandleDrag(){
  var el=document.getElementById('candle-drag');if(!el)return;

  function screenToWorld(sx,sy){
    var rect=renderer.domElement.getBoundingClientRect();
    var nx=((sx-rect.left)/rect.width)*2-1,ny=-((sy-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(new THREE.Vector2(nx,ny),camera);
    var hits=raycaster.intersectObject(groundPlane);
    if(hits.length>0){return{x:hits[0].point.x,z:hits[0].point.z};}
    var o=raycaster.ray.origin,d=raycaster.ray.direction;
    if(Math.abs(d.y)>0.0001){var t2=(0.02-o.y)/d.y;if(t2>0)return{x:o.x+d.x*t2,z:o.z+d.z*t2};}
    return null;
  }

  function isUnderPlate(wx,wz){
    if(!plateInfo)return false;
    var pi=plateInfo;
    var lx=wx-pi.cx, lz=wz-pi.cz;
    var hw=pi.w/2+0.3, hh=pi.h/2+0.3; // small margin
    return(lx>=-hw&&lx<=hw&&lz>=-hh&&lz<=hh);
  }

  el.addEventListener('mousedown',function(e){
    if(currentStep!==1)return;
    // If candle already placed, clicking the empty box resets candle
    if(candlePlaced){resetCandle();return;}
    e.preventDefault();e.stopPropagation();isDraggingCandle=true;
    var rect=el.getBoundingClientRect(),offX=e.clientX-rect.left,offY=e.clientY-rect.top;
    var ghost=el.cloneNode(true);ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.8;width:'+rect.width+'px;';
    document.body.appendChild(ghost);cg(ghost,e.clientX,e.clientY,offX,offY);
    var moved=false,sx=e.clientX;
    function onM(ev){cg(ghost,ev.clientX,ev.clientY,offX,offY);if(Math.hypot(ev.clientX-sx,ev.clientY-e.clientY)>5)moved=true;}
    function onU(ev){document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);isDraggingCandle=false;ghost.remove();
      if(moved){var pos=screenToWorld(ev.clientX,ev.clientY);if(pos&&isUnderPlate(pos.x,pos.z))placeCandle(pos.x,pos.z);}
    }
    document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);
  });
  el.addEventListener('touchstart',function(e){
    if(currentStep!==1)return;
    if(candlePlaced){resetCandle();return;}
    e.preventDefault();e.stopPropagation();isDraggingCandle=true;
    var t0=e.touches[0],rect=el.getBoundingClientRect(),offX=t0.clientX-rect.left,offY=t0.clientY-rect.top;
    var ghost=el.cloneNode(true);ghost.style.cssText='position:fixed;pointer-events:none;z-index:9999;opacity:0.8;width:'+rect.width+'px;';
    document.body.appendChild(ghost);cg(ghost,t0.clientX,t0.clientY,offX,offY);
    var moved=false,sx=t0.clientX,sy=t0.clientY;
    function onM(ev){ev.preventDefault();var tc=ev.touches[0];cg(ghost,tc.clientX,tc.clientY,offX,offY);if(Math.hypot(tc.clientX-sx,tc.clientY-sy)>5)moved=true;}
    function onE(ev){el.removeEventListener('touchmove',onM);el.removeEventListener('touchend',onE);isDraggingCandle=false;ghost.remove();var ct=ev.changedTouches[0];if(moved){var pos=screenToWorld(ct.clientX,ct.clientY);if(pos&&isUnderPlate(pos.x,pos.z))placeCandle(pos.x,pos.z);}}
    el.addEventListener('touchmove',onM,{passive:false});el.addEventListener('touchend',onE);
  },{passive:false});
  function cg(g,mx,my,ox,oy){g.style.left=(mx-ox)+'px';g.style.top=(my-oy)+'px';}
}
